    <circle id="lr-dot-2" cx="245" cy="300" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    <circle id="lr-dot-3" cx="255" cy="350" r="5" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    
