    <circle id="ur-dot-2" cx="260" cy="190" r="3" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    <circle id="ur-dot-3" cx="245" cy="205" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    <circle id="ur-dot-4" cx="270" cy="220" r="3" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
