  <ellipse id="body-inner" cx="200" cy="200" rx="8" ry="70" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Body segments -->
  <line x1="185" y1="140" x2="215" y2="140" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="185" y1="160" x2="215" y2="160" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="185" y1="180" x2="215" y2="180" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="185" y1="200" x2="215" y2="200" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="185" y1="220" x2="215" y2="220" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="185" y1="240" x2="215" y2="240" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="185" y1="260" x2="215" y2="260" stroke="#1a1a1a" stroke-width="0.8"/>
  
