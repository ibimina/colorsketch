<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Kawaii Panda with Bamboo -->
  
  <!-- Bamboo background left -->
  <rect id="bamboo-stem-1" x="40" y="50" width="20" height="340" rx="5" fill="white"/>
  <path id="bamboo-node-1-1" d="M40 100 L60 100" fill="none" stroke-width="3"/>
  <path id="bamboo-node-1-2" d="M40 180 L60 180" fill="none" stroke-width="3"/>
  <path id="bamboo-node-1-3" d="M40 260 L60 260" fill="none" stroke-width="3"/>
  <path id="bamboo-leaf-1-1" d="M60 90 Q80 70 100 80 Q80 85 60 95" fill="white"/>
  <path id="bamboo-leaf-1-2" d="M60 170 Q85 150 105 165 Q85 175 60 180" fill="white"/>
  
  <!-- Bamboo background right -->
  <rect id="bamboo-stem-2" x="340" y="30" width="18" height="360" rx="4" fill="white"/>
  <path id="bamboo-node-2-1" d="M340 80 L358 80" fill="none" stroke-width="3"/>
  <path id="bamboo-node-2-2" d="M340 150 L358 150" fill="none" stroke-width="3"/>
  <path id="bamboo-node-2-3" d="M340 230 L358 230" fill="none" stroke-width="3"/>
  <path id="bamboo-leaf-2-1" d="M340 70 Q320 55 300 65 Q318 72 340 75" fill="white"/>
  <path id="bamboo-leaf-2-2" d="M340 145 Q315 130 295 140 Q315 150 340 150" fill="white"/>
  
  <!-- Panda Body -->
  <ellipse id="body" cx="200" cy="300" rx="90" ry="80" fill="white"/>
  
  <!-- Belly patch -->
  <ellipse id="belly" cx="200" cy="310" rx="55" ry="50" fill="white" stroke-dasharray="4,4"/>
  
  <!-- Back legs -->
  <ellipse id="leg-left" cx="140" cy="360" rx="30" ry="25" fill="white"/>
  <ellipse id="leg-right" cx="260" cy="360" rx="30" ry="25" fill="white"/>
  
  <!-- Paw pads -->
  <ellipse id="pad-left-main" cx="135" cy="365" rx="12" ry="10" fill="white"/>
  <circle id="pad-left-1" cx="125" cy="355" r="5" fill="white"/>
  <circle id="pad-left-2" cx="135" cy="352" r="5" fill="white"/>
  <circle id="pad-left-3" cx="145" cy="355" r="5" fill="white"/>
  
  <ellipse id="pad-right-main" cx="265" cy="365" rx="12" ry="10" fill="white"/>
  <circle id="pad-right-1" cx="255" cy="355" r="5" fill="white"/>
  <circle id="pad-right-2" cx="265" cy="352" r="5" fill="white"/>
  <circle id="pad-right-3" cx="275" cy="355" r="5" fill="white"/>
  
  <!-- Front paws/arms -->
  <ellipse id="arm-left" cx="125" cy="280" rx="28" ry="35" fill="white"/>
  <ellipse id="arm-right" cx="275" cy="280" rx="28" ry="35" fill="white"/>
  
  <!-- Bamboo being held -->
  <rect id="held-bamboo" x="265" y="200" width="15" height="120" rx="3" fill="white"/>
  <path id="held-bamboo-node-1" d="M265 230 L280 230" fill="none" stroke-width="2"/>
  <path id="held-bamboo-node-2" d="M265 280 L280 280" fill="none" stroke-width="2"/>
  <path id="held-bamboo-leaf" d="M280 215 Q300 200 310 215 Q295 220 280 220" fill="white"/>
  
  <!-- Head -->
  <ellipse id="head" cx="200" cy="160" rx="75" ry="70" fill="white"/>
  
  <!-- Ears -->
  <ellipse id="ear-left" cx="135" cy="95" rx="30" ry="28" fill="white"/>
  <ellipse id="ear-right" cx="265" cy="95" rx="30" ry="28" fill="white"/>
  <ellipse id="ear-inner-left" cx="135" cy="95" rx="15" ry="14" fill="white"/>
  <ellipse id="ear-inner-right" cx="265" cy="95" rx="15" ry="14" fill="white"/>
  
  <!-- Eye patches (panda markings) -->
  <ellipse id="eye-patch-left" cx="160" cy="155" rx="35" ry="30" fill="white"/>
  <ellipse id="eye-patch-right" cx="240" cy="155" rx="35" ry="30" fill="white"/>
  
  <!-- Eyes -->
  <ellipse id="eye-left" cx="160" cy="155" rx="18" ry="20" fill="white"/>
  <ellipse id="eye-right" cx="240" cy="155" rx="18" ry="20" fill="white"/>
  <circle id="pupil-left" cx="165" cy="158" r="10" fill="white"/>
  <circle id="pupil-right" cx="245" cy="158" r="10" fill="white"/>
  <circle id="sparkle-left-1" cx="158" cy="150" r="5" fill="white"/>
  <circle id="sparkle-left-2" cx="170" cy="162" r="2" fill="white"/>
  <circle id="sparkle-right-1" cx="238" cy="150" r="5" fill="white"/>
  <circle id="sparkle-right-2" cx="250" cy="162" r="2" fill="white"/>
  
  <!-- Nose -->
  <ellipse id="nose" cx="200" cy="190" rx="12" ry="8" fill="white"/>
  
  <!-- Mouth -->
  <path id="mouth-left" d="M188 200 Q195 210 200 200" fill="none"/>
  <path id="mouth-right" d="M200 200 Q205 210 212 200" fill="none"/>
  
  <!-- Blush -->
  <ellipse id="blush-left" cx="130" cy="175" rx="12" ry="6" fill="white" stroke-dasharray="2,2"/>
  <ellipse id="blush-right" cx="270" cy="175" rx="12" ry="6" fill="white" stroke-dasharray="2,2"/>
  
  <!-- Small hearts -->
  <path id="heart-1" d="M90 140 Q95 135 100 140 Q105 135 110 140 Q110 150 100 158 Q90 150 90 140" fill="white"/>
  <path id="heart-2" d="M300 125 Q303 122 306 125 Q309 122 312 125 Q312 130 306 135 Q300 130 300 125" fill="white"/>
  
  <!-- Stars -->
  <path id="star-1" d="M85 200 L88 210 L78 205 L92 205 L82 210 Z" fill="white"/>
  <path id="star-2" d="M315 180 L318 190 L308 185 L322 185 L312 190 Z" fill="white"/>
</svg>