  <path id="boot-right" d="M230 340 L240 340 L245 365 L250 380 L215 380 L215 365 L220 340" fill="white"/>
  <path id="boot-left-top" d="M150 340 Q160 335 170 340" fill="none"/>
  <path id="boot-right-top" d="M220 340 Q230 335 240 340" fill="none"/>
  <path id="boot-left-detail" d="M145 365 L175 365" fill="none"/>
  <path id="boot-right-detail" d="M215 365 L245 365" fill="none"/>
  
  <!-- Legs -->
  <rect id="leg-left" x="155" y="290" width="20" height="50" fill="white"/>
  <rect id="leg-right" x="215" y="290" width="20" height="50" fill="white"/>
  
  <!-- Raincoat -->
  <path id="raincoat" d="M140 180 L120 290 Q120 310 140 320 L175 330 Q195 335 215 330 L250 320 Q270 310 270 290 L250 180" fill="white"/>
  <path id="raincoat-buttons" d="M195 200 L195 300" fill="none" stroke-dasharray="8,12"/>
  <circle id="button-1" cx="195" cy="210" r="4" fill="white"/>
  <circle id="button-2" cx="195" cy="245" r="4" fill="white"/>
  <circle id="button-3" cx="195" cy="280" r="4" fill="white"/>
  
