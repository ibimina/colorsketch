  <path id="eye-left" d="M178 142 Q185 135 192 142" fill="none" stroke-width="2.5"/>
  <path id="eye-right" d="M198 142 Q205 135 212 142" fill="none" stroke-width="2.5"/>
  
  <!-- Nose -->
  <path id="nose" d="M195 148 Q197 153 195 158" fill="none"/>
  
  <!-- Mouth - happy smile -->
  <path id="mouth" d="M185 168 Q195 178 205 168" fill="none"/>
  
  <!-- Blush -->
  <ellipse id="blush-left" cx="170" cy="155" rx="8" ry="4" fill="white" stroke-dasharray="2,2"/>
  <ellipse id="blush-right" cx="220" cy="155" rx="8" ry="4" fill="white" stroke-dasharray="2,2"/>
  
  <!-- Rain ripples in puddle -->
  <circle id="ripple-1" cx="160" cy="380" r="8" fill="none"/>
  <circle id="ripple-2" cx="240" cy="378" r="6" fill="none"/>
  <circle id="ripple-3" cx="200" cy="382" r="5" fill="none"/>
</svg>