  <path id="umbrella-canopy" d="M120 100 Q195 -10 350 100 Q300 110 275 105 Q245 115 195 105 Q165 115 120 100" fill="white"/>
  <path id="umbrella-section-1" d="M160 95 Q165 50 195 30" fill="none"/>
  <path id="umbrella-section-2" d="M235 90 Q240 45 275 25" fill="none"/>
  <path id="umbrella-section-3" d="M310 95 Q315 55 340 40" fill="none"/>
  <path id="umbrella-edge" d="M120 100 Q140 115 160 100 Q180 115 200 100 Q220 115 240 100 Q260 115 280 100 Q300 115 320 100 Q340 115 350 100" fill="none"/>
  
  <!-- Umbrella handle -->
  <line id="umbrella-pole" x1="235" y1="30" x2="305" y2="105" stroke-width="3"/>
  <path id="umbrella-handle" d="M235 30 Q220 35 220 50 Q220 60 230 60" fill="none" stroke-width="3"/>
  
