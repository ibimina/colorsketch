<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Girl with Umbrella in Rain -->
  
  <!-- Rain drops -->
  <path id="rain-1" d="M50 30 L48 50" fill="none"/>
  <path id="rain-2" d="M80 20 L78 45" fill="none"/>
  <path id="rain-3" d="M120 35 L118 55" fill="none"/>
  <path id="rain-4" d="M280 25 L278 50" fill="none"/>
  <path id="rain-5" d="M320 30 L318 55" fill="none"/>
  <path id="rain-6" d="M350 20 L348 45" fill="none"/>
  <path id="rain-7" d="M30 80 L28 100" fill="none"/>
  <path id="rain-8" d="M370 75 L368 95" fill="none"/>
  <path id="rain-9" d="M40 150 L38 175" fill="none"/>
  <path id="rain-10" d="M360 160 L358 185" fill="none"/>
  <path id="rain-11" d="M25 230 L23 255" fill="none"/>
  <path id="rain-12" d="M375 240 L373 265" fill="none"/>
  <path id="rain-13" d="M50 300 L48 325" fill="none"/>
  <path id="rain-14" d="M350 310 L348 335" fill="none"/>
  
  <!-- Puddle -->
  <ellipse id="puddle" cx="200" cy="380" rx="120" ry="15" fill="white"/>
