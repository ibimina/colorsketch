  <path id="hood" d="M145 150 Q140 120 170 100 Q195 90 220 100 Q250 120 245 150" fill="white"/>
  <path id="hood-edge" d="M150 155 Q195 145 240 155" fill="none"/>
  
  <!-- Arm holding umbrella -->
  <path id="arm-right" d="M245 190 Q270 170 290 140 Q300 125 305 110" fill="white"/>
  <path id="arm-right-outline" d="M245 190 Q270 170 290 140 Q300 125 305 110" fill="none" stroke-width="12" stroke="white"/>
  <path id="arm-right-line" d="M245 190 Q270 170 290 140 Q300 125 305 110" fill="none"/>
  
  <!-- Hand -->
  <ellipse id="hand" cx="305" cy="105" rx="12" ry="10" fill="white"/>
  
  <!-- Other arm in pocket -->
  <path id="arm-left" d="M145 200 Q130 220 135 260" fill="white"/>
  <path id="pocket" d="M130 245 Q140 270 155 275 L148 250 Z" fill="white"/>
  
