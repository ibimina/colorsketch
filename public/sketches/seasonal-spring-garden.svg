<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Spring Garden - Seasonal Themed - Adult Coloring -->
  
  <!-- Sky background -->
  <rect x="0" y="0" width="500" height="250" fill="white" stroke="none"/>
  
  <!-- Sun -->
  <g id="sun" transform="translate(400, 70)">
    <circle cx="0" cy="0" r="30" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <line x1="0" y1="-40" x2="0" y2="-50" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="0" y1="40" x2="0" y2="50" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="-40" y1="0" x2="-50" y2="0" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="40" y1="0" x2="50" y2="0" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="-28" y1="-28" x2="-35" y2="-35" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="28" y1="28" x2="35" y2="35" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="-28" y1="28" x2="-35" y2="35" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="28" y1="-28" x2="35" y2="-35" stroke="#1a1a1a" stroke-width="2"/>
  </g>
  
  <!-- Clouds -->
  <g id="clouds">
    <g transform="translate(100, 60)">
      <ellipse cx="0" cy="0" rx="25" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <ellipse cx="-18" cy="-3" rx="18" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <ellipse cx="18" cy="-3" rx="18" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>
  </g>
  
  <!-- Ground/grass line -->
  <path d="M 0 250 L 0 400 L 500 400 L 500 250 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M 0 250 Q 50 245 100 250 Q 150 255 200 250 Q 250 245 300 250 Q 350 255 400 250 Q 450 245 500 250" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Grass blades -->
  <g id="grass">
    <line x1="30" y1="250" x2="28" y2="240" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="35" y1="250" x2="37" y2="238" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="70" y1="250" x2="68" y2="242" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="75" y1="250" x2="77" y2="240" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="110" y1="250" x2="108" y2="238" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="150" y1="250" x2="152" y2="242" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="190" y1="250" x2="188" y2="240" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="230" y1="250" x2="232" y2="238" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="270" y1="250" x2="268" y2="242" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="310" y1="250" x2="312" y2="240" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="350" y1="250" x2="348" y2="238" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="390" y1="250" x2="392" y2="242" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="430" y1="250" x2="428" y2="240" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="470" y1="250" x2="472" y2="238" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  
  <!-- Tulips -->
  <g id="tulips">
    <g transform="translate(80, 300)">
      <line x1="0" y1="0" x2="0" y2="50" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="-3" cy="15" rx="6" ry="10" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="3" cy="15" rx="6" ry="10" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M -6 5 Q 0 -5 6 5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 L 0 15" stroke="#1a1a1a" stroke-width="0.7"/>
      <ellipse cx="-8" cy="35" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="8" cy="35" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    </g>
    
    <g transform="translate(120, 310)">
      <line x1="0" y1="0" x2="0" y2="45" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="-3" cy="15" rx="6" ry="10" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="3" cy="15" rx="6" ry="10" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M -6 5 Q 0 -5 6 5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 L 0 15" stroke="#1a1a1a" stroke-width="0.7"/>
      <ellipse cx="-8" cy="30" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="8" cy="30" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    </g>
    
    <g transform="translate(100, 305)">
      <line x1="0" y1="0" x2="0" y2="48" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="-3" cy="15" rx="6" ry="10" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="3" cy="15" rx="6" ry="10" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M -6 5 Q 0 -5 6 5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 L 0 15" stroke="#1a1a1a" stroke-width="0.7"/>
      <ellipse cx="-8" cy="33" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="8" cy="33" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Daisies -->
  <g id="daisies">
    <g transform="translate(200, 320)">
      <circle cx="0" cy="0" r="5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="#1a1a1a"/>
      <ellipse cx="0" cy="-8" rx="3" ry="6" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="0" cy="8" rx="3" ry="6" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="-8" cy="0" rx="6" ry="3" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="8" cy="0" rx="6" ry="3" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="-6" cy="-6" rx="4" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1" transform="rotate(-45 -6 -6)"/>
      <ellipse cx="6" cy="-6" rx="4" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1" transform="rotate(45 6 -6)"/>
      <ellipse cx="-6" cy="6" rx="4" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1" transform="rotate(45 -6 6)"/>
      <ellipse cx="6" cy="6" rx="4" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1" transform="rotate(-45 6 6)"/>
      <line x1="0" y1="8" x2="0" y2="50" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="-6" cy="25" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="6" cy="30" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    </g>
    
    <g transform="translate(240, 315)">
      <circle cx="0" cy="0" r="5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="#1a1a1a"/>
      <ellipse cx="0" cy="-8" rx="3" ry="6" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="0" cy="8" rx="3" ry="6" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="-8" cy="0" rx="6" ry="3" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="8" cy="0" rx="6" ry="3" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="-6" cy="-6" rx="4" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1" transform="rotate(-45 -6 -6)"/>
      <ellipse cx="6" cy="-6" rx="4" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1" transform="rotate(45 6 -6)"/>
      <ellipse cx="-6" cy="6" rx="4" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1" transform="rotate(45 -6 6)"/>
      <ellipse cx="6" cy="6" rx="4" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1" transform="rotate(-45 6 6)"/>
      <line x1="0" y1="8" x2="0" y2="55" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="-6" cy="28" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="6" cy="35" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Sunflower (large centerpiece) -->
  <g id="sunflower" transform="translate(350, 300)">
    <line x1="0" y1="40" x2="0" y2="100" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="0" cy="0" r="35" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="0" r="15" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Center seed pattern -->
    <circle cx="-7" cy="-7" r="2" fill="#1a1a1a"/>
    <circle cx="0" cy="-9" r="2" fill="#1a1a1a"/>
    <circle cx="7" cy="-7" r="2" fill="#1a1a1a"/>
    <circle cx="-9" cy="0" r="2" fill="#1a1a1a"/>
    <circle cx="9" cy="0" r="2" fill="#1a1a1a"/>
    <circle cx="-7" cy="7" r="2" fill="#1a1a1a"/>
    <circle cx="0" cy="9" r="2" fill="#1a1a1a"/>
    <circle cx="7" cy="7" r="2" fill="#1a1a1a"/>
    <circle cx="0" cy="0" r="2" fill="#1a1a1a"/>
    
    <!-- Petals -->
    <ellipse cx="0" cy="-28" rx="8" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 0 -28 L 0 -15" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <ellipse cx="20" cy="-20" rx="8" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(45 20 -20)"/>
    <path d="M 20 -20 L 11 -11" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <ellipse cx="28" cy="0" rx="8" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(90 28 0)"/>
    <path d="M 28 0 L 15 0" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <ellipse cx="20" cy="20" rx="8" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(135 20 20)"/>
    <path d="M 20 20 L 11 11" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <ellipse cx="0" cy="28" rx="8" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 0 28 L 0 15" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <ellipse cx="-20" cy="20" rx="8" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-135 -20 20)"/>
    <path d="M -20 20 L -11 11" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <ellipse cx="-28" cy="0" rx="8" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(90 -28 0)"/>
    <path d="M -28 0 L -15 0" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <ellipse cx="-20" cy="-20" rx="8" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-45 -20 -20)"/>
    <path d="M -20 -20 L -11 -11" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <!-- Leaves on stem -->
    <path d="M -3 60 Q -15 55 -20 60 Q -15 65 -3 62 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M -3 60 Q -10 57 -15 60" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <path d="M 3 80 Q 15 75 20 80 Q 15 85 3 82 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 3 80 Q 10 77 15 80" stroke="#1a1a1a" stroke-width="0.7"/>
  </g>
  
  <!-- Butterflies -->
  <g id="butterfly-1" transform="translate(150, 120)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="3" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="0" cy="-10" r="4" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Antennae -->
    <path d="M -2 -13 Q -4 -18 -3 -22" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M 2 -13 Q 4 -18 3 -22" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="-3" cy="-22" r="1.5" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="3" cy="-22" r="1.5" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    
    <!-- Left wings -->
    <ellipse cx="-12" cy="-5" rx="12" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <ellipse cx="-10" cy="8" rx="10" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="-12" cy="-5" r="4" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <circle cx="-12" cy="-5" r="2" fill="#1a1a1a"/>
    <circle cx="-10" cy="8" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <!-- Right wings -->
    <ellipse cx="12" cy="-5" rx="12" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <ellipse cx="10" cy="8" rx="10" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="12" cy="-5" r="4" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <circle cx="12" cy="-5" r="2" fill="#1a1a1a"/>
    <circle cx="10" cy="8" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
  </g>
  
  <g id="butterfly-2" transform="translate(450, 180)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="2.5" ry="10" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="0" cy="-8" r="3.5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Antennae -->
    <path d="M -1.5 -11 Q -3 -15 -2 -18" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M 1.5 -11 Q 3 -15 2 -18" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="-2" cy="-18" r="1" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="2" cy="-18" r="1" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    
    <!-- Wings -->
    <ellipse cx="-10" cy="-4" rx="10" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <ellipse cx="-8" cy="6" rx="8" ry="10" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="-10" cy="-4" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <circle cx="-10" cy="-4" r="1.5" fill="#1a1a1a"/>
    
    <ellipse cx="10" cy="-4" rx="10" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <ellipse cx="8" cy="6" rx="8" ry="10" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="10" cy="-4" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <circle cx="10" cy="-4" r="1.5" fill="#1a1a1a"/>
  </g>
</svg>