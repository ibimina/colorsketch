    <circle id="dot-4" cx="215" cy="185" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
    <circle id="dot-5" cx="225" cy="170" r="1.5" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
