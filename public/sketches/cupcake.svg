<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Cute Cupcake - Kawaii Style -->
  
  <!-- Frosting -->
  <path id="frosting-base" d="M100 200 Q90 170 110 150 Q130 130 160 140 Q180 120 200 125 Q220 120 240 140 Q270 130 290 150 Q310 170 300 200" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Frosting swirls -->
  <path id="frosting-swirl-1" d="M140 180 Q130 160 150 150 Q170 145 175 165 Q178 180 165 190 Q150 195 140 180" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <path id="frosting-swirl-2" d="M185 165 Q180 145 200 140 Q220 138 225 155 Q228 170 215 180 Q200 185 185 170" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <path id="frosting-swirl-3" d="M240 180 Q235 160 250 155 Q270 152 275 170 Q278 185 260 190 Q245 192 240 180" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  
  <!-- Top swirl -->
  <path id="frosting-top" d="M185 145 Q175 120 200 110 Q225 105 230 130 Q232 145 220 155 Q205 160 190 150" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <path id="frosting-peak" d="M200 115 Q195 90 210 80 Q225 85 220 105 Q215 115 205 118" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  
  <!-- Cherry on top -->
  <circle id="cherry" cx="210" cy="65" r="20" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <path id="cherry-stem" d="M210 48 Q220 35 230 30 Q240 32 235 42" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="205" cy="60" rx="4" ry="3" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Sprinkles -->
  <ellipse id="sprinkle-1" cx="125" cy="165" rx="4" ry="8" transform="rotate(30 125 165)" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <ellipse id="sprinkle-2" cx="155" cy="180" rx="4" ry="8" transform="rotate(-20 155 180)" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <ellipse id="sprinkle-3" cx="200" cy="155" rx="4" ry="8" transform="rotate(45 200 155)" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <ellipse id="sprinkle-4" cx="245" cy="175" rx="4" ry="8" transform="rotate(-35 245 175)" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <ellipse id="sprinkle-5" cx="275" cy="160" rx="4" ry="8" transform="rotate(15 275 160)" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <ellipse id="sprinkle-6" cx="170" cy="135" rx="3" ry="6" transform="rotate(-45 170 135)" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <ellipse id="sprinkle-7" cx="230" cy="140" rx="3" ry="6" transform="rotate(60 230 140)" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <!-- Cupcake wrapper -->
  <path id="wrapper" d="M100 200 L85 350 Q90 365 115 365 L285 365 Q310 365 315 350 L300 200" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Wrapper ridges -->
  <path d="M100 200 L93 280 M115 200 L110 280 M130 200 L127 280 M145 200 L143 280 M160 200 L159 280 M175 200 L175 280 M190 200 L191 280 M205 200 L207 280 M220 200 L223 280 M235 200 L239 280 M250 200 L255 280 M265 200 L272 280 M280 200 L288 280 M295 200 L305 280" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <!-- Wrapper bottom ridges -->
  <path d="M93 280 L88 340 M110 280 L107 340 M127 280 L126 340 M143 280 L143 340 M159 280 L160 340 M175 280 L177 340 M191 280 L194 340 M207 280 L211 340 M223 280 L228 340 M239 280 L245 340 M255 280 L262 340 M272 280 L280 340 M288 280 L297 340 M305 280 L312 340" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <!-- Kawaii face -->
  <circle id="eye-left" cx="165" cy="275" r="12" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="168" cy="277" r="6" fill="#1a1a1a"/>
  <circle cx="170" cy="274" r="2.5" fill="white"/>
  
  <circle id="eye-right" cx="235" cy="275" r="12" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="232" cy="277" r="6" fill="#1a1a1a"/>
  <circle cx="230" cy="274" r="2.5" fill="white"/>
  
  <!-- Blush -->
  <ellipse id="blush-left" cx="145" cy="295" rx="10" ry="6" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  <ellipse id="blush-right" cx="255" cy="295" rx="10" ry="6" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  
  <!-- Smile -->
  <path d="M185 305 Q200 320 215 305" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
</svg>