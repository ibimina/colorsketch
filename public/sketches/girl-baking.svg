  <rect id="tile-2" x="70" y="50" width="40" height="40" fill="white"/>
  <rect id="tile-3" x="20" y="100" width="40" height="40" fill="white"/>
  <rect id="tile-4" x="70" y="100" width="40" height="40" fill="white"/>
  <rect id="tile-5" x="290" y="50" width="40" height="40" fill="white"/>
  <rect id="tile-6" x="340" y="50" width="40" height="40" fill="white"/>
  <rect id="tile-7" x="290" y="100" width="40" height="40" fill="white"/>
  <rect id="tile-8" x="340" y="100" width="40" height="40" fill="white"/>
  
