  <path id="nose" d="M200 120 Q203 128 200 135" fill="none"/>
  
  <!-- Mouth - concentrating -->
  <path id="mouth" d="M190 145 Q200 150 210 145" fill="none"/>
  
  <!-- Blush -->
  <ellipse id="blush-left" cx="165" cy="130" rx="8" ry="4" fill="white" stroke-dasharray="2,2"/>
  <ellipse id="blush-right" cx="235" cy="130" rx="8" ry="4" fill="white" stroke-dasharray="2,2"/>
  
  <!-- Steam/aroma lines -->
  <path id="steam-1" d="M185 255 Q180 245 185 235" fill="none" stroke-dasharray="3,3"/>
  <path id="steam-2" d="M200 252 Q205 242 200 232" fill="none" stroke-dasharray="3,3"/>
  <path id="steam-3" d="M215 255 Q220 245 215 235" fill="none" stroke-dasharray="3,3"/>
  
  <!-- Hearts (love for baking) -->
  <path id="heart-1" d="M280 150 Q284 146 288 150 Q292 146 296 150 Q296 158 288 165 Q280 158 280 150" fill="white"/>
  <path id="heart-2" d="M100 160 Q103 157 106 160 Q109 157 112 160 Q112 166 106 172 Q100 166 100 160" fill="white"/>
  
  <!-- Sprinkles on counter -->
  <circle id="sprinkle-1" cx="120" cy="310" r="2" fill="white"/>
  <ellipse id="sprinkle-2" cx="135" cy="305" rx="3" ry="1" fill="white" transform="rotate(45 135 305)"/>
  <circle id="sprinkle-3" cx="260" cy="308" r="2" fill="white"/>
  <ellipse id="sprinkle-4" cx="275" cy="312" rx="3" ry="1" fill="white" transform="rotate(-30 275 312)"/>
