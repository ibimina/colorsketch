  <!-- Girl -->
  <!-- Apron -->
  <path id="apron" d="M160 200 Q155 250 160 295 Q200 305 240 295 Q245 250 240 200" fill="white"/>
  <path id="apron-pocket" d="M180 250 L220 250 L218 280 L182 280 Z" fill="white"/>
  <path id="apron-tie-left" d="M160 210 Q140 205 135 215 Q140 225 160 218" fill="white"/>
  <path id="apron-tie-right" d="M240 210 Q260 205 265 215 Q260 225 240 218" fill="white"/>
  <path id="apron-neck" d="M175 160 L180 200 M225 160 L220 200" fill="none" stroke-width="3"/>
  
