  <path id="cupcake-1-wrapper" d="M50 290 L45 265 L75 265 L70 290" fill="white"/>
  <path id="cupcake-1-wrapper-lines" d="M50 285 L48 268 M55 285 L54 268 M60 285 L60 268 M65 285 L66 268" fill="none"/>
  <path id="cupcake-1-frosting" d="M42 265 Q45 240 58 235 Q70 230 75 245 Q82 235 78 265" fill="white"/>
  <circle id="cupcake-1-cherry" cx="60" cy="235" r="6" fill="white"/>
