  <path id="chef-hat-pleat-2" d="M195 35 Q200 25 205 35" fill="none"/>
  <path id="chef-hat-pleat-3" d="M220 40 Q225 30 230 40" fill="none"/>
  
  <!-- Hair showing -->
  <path id="hair-bangs" d="M160 110 Q170 100 180 108 Q190 98 200 105 Q210 98 220 108 Q230 100 240 110" fill="white"/>
  
  <!-- Face -->
  <!-- Eyes - focused on baking -->
  <ellipse id="eye-left" cx="180" cy="115" rx="10" ry="12" fill="white"/>
  <ellipse id="eye-right" cx="220" cy="115" rx="10" ry="12" fill="white"/>
  <circle id="pupil-left" cx="182" cy="118" r="6" fill="white"/>
  <circle id="pupil-right" cx="222" cy="118" r="6" fill="white"/>
  <circle id="sparkle-left" cx="178" cy="112" r="3" fill="white"/>
  <circle id="sparkle-right" cx="218" cy="112" r="3" fill="white"/>
  
  <!-- Eyebrows -->
  <path id="eyebrow-left" d="M168 102 Q180 98 192 102" fill="none"/>
  <path id="eyebrow-right" d="M208 102 Q220 98 232 102" fill="none"/>
  
