  <path id="cupcake-2-frosting" d="M312 265 Q315 240 328 235 Q340 230 345 245 Q352 235 348 265" fill="white"/>
  <circle id="cupcake-2-cherry" cx="330" cy="235" r="6" fill="white"/>
  
  <!-- Mixing bowl -->
  <ellipse id="bowl" cx="200" cy="280" rx="60" ry="30" fill="white"/>
  <ellipse id="bowl-rim" cx="200" cy="265" rx="55" ry="20" fill="white"/>
  <ellipse id="bowl-inner" cx="200" cy="268" rx="45" ry="15" fill="white" stroke-dasharray="3,3"/>
  
  <!-- Batter in bowl -->
  <path id="batter" d="M160 268 Q180 260 200 265 Q220 258 240 268" fill="white"/>
  
