    <line x1="170" y1="460" x2="170" y2="475" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="170" y1="460" x2="180" y2="470" stroke="#1a1a1a" stroke-width="2"/>
    
    <line x1="220" y1="380" x2="230" y2="460" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="230" y1="460" x2="220" y2="470" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="230" y1="460" x2="230" y2="475" stroke="#1a1a1a" stroke-width="2"/>
