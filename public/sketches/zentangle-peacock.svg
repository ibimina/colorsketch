    <circle cx="195" cy="190" r="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="200" cy="200" rx="3" ry="18" fill="white" stroke="#1a1a1a" stroke-width="1"/>
