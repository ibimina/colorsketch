    <line x1="200" y1="150" x2="200" y2="85" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(180 200 200)"/>
    <line x1="200" y1="150" x2="200" y2="85" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(210 200 200)"/>
    <line x1="200" y1="150" x2="200" y2="85" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(240 200 200)"/>
    <line x1="200" y1="150" x2="200" y2="85" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(270 200 200)"/>
    <line x1="200" y1="150" x2="200" y2="85" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(300 200 200)"/>
    <line x1="200" y1="150" x2="200" y2="85" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(330 200 200)"/>
