  <circle id="inner-4" cx="200" cy="200" r="20" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <circle id="inner-5" cx="200" cy="200" r="10" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Radiating lines -->
  <g id="radial-lines">
    <line x1="200" y1="150" x2="200" y2="85" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="200" y1="150" x2="200" y2="85" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(30 200 200)"/>
    <line x1="200" y1="150" x2="200" y2="85" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(60 200 200)"/>
    <line x1="200" y1="150" x2="200" y2="85" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(90 200 200)"/>
    <line x1="200" y1="150" x2="200" y2="85" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(120 200 200)"/>
