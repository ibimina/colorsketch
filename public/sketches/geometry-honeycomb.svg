      <circle r="3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <circle cx="-4" cy="0" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <circle cx="4" cy="0" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <circle cx="0" cy="-4" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <circle cx="0" cy="4" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
