    <path id="fold-3" d="M200 280 Q200 340 200 400" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <path id="fold-4" d="M240 285 Q250 340 255 400" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <path id="fold-5" d="M270 285 Q280 340 285 400" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    
