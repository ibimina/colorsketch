    <path id="lash-l-1" d="M163 100 Q165 95 168 98" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="lash-l-2" d="M166 98 Q169 93 172 97" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="lash-l-3" d="M170 97 Q174 92 177 97" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    
    <ellipse id="eye-r" cx="225" cy="105" rx="12" ry="8" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <circle id="iris-r" cx="225" cy="105" r="5" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="lash-r-1" d="M237 100 Q235 95 232 98" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="lash-r-2" d="M234 98 Q231 93 228 97" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="lash-r-3" d="M230 97 Q226 92 223 97" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
