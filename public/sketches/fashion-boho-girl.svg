    <ellipse id="pendant" cx="200" cy="190" rx="8" ry="10" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <ellipse id="pendant-i" cx="200" cy="190" rx="4" ry="5" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
