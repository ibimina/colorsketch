      <circle id="sk-f1-i" cx="130" cy="340" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      
      <circle id="sk-f2" cx="180" cy="350" r="10" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
      <circle id="sk-f2-i" cx="180" cy="350" r="5" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      
      <circle id="sk-f3" cx="220" cy="345" r="9" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
      <circle id="sk-f3-i" cx="220" cy="345" r="5" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      
      <circle id="sk-f4" cx="265" cy="335" r="8" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
      <circle id="sk-f4-i" cx="265" cy="335" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      
