      <ellipse cx="150" cy="62" rx="3" ry="5" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      <ellipse cx="150" cy="82" rx="3" ry="5" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
