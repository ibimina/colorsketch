      <ellipse cx="200" cy="72" rx="4" ry="6" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      <ellipse cx="188" cy="60" rx="6" ry="4" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      <ellipse cx="212" cy="60" rx="6" ry="4" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
    </g>
    
