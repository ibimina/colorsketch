    <path id="hair-right-2" d="M260 85 Q285 110 300 160 Q315 220 305 300 Q295 370 280 400" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="hair-top" d="M130 80 Q150 60 200 50 Q250 60 270 80" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
    
    <!-- Hair texture waves -->
    <path id="wave-1" d="M90 180 Q100 175 110 185" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="wave-2" d="M85 220 Q95 215 105 225" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="wave-3" d="M80 260 Q90 255 100 265" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="wave-4" d="M85 300 Q95 295 105 305" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="wave-5" d="M290 180 Q300 175 310 185" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="wave-6" d="M295 220 Q305 215 315 225" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
