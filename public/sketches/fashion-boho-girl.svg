      <circle id="em-center-c" cx="200" cy="230" r="3" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      <ellipse cx="200" cy="213" rx="4" ry="7" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      <ellipse cx="200" cy="247" rx="4" ry="7" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      <ellipse cx="183" cy="230" rx="7" ry="4" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
