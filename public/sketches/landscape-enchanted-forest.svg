    <path id="branch-r1" d="M325 200 Q360 180 380 150" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path id="branch-r2" d="M320 160 Q350 140 370 100" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path id="branch-r3" d="M315 130 Q340 100 350 60" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path id="branch-r4" d="M300 180 Q270 150 240 130" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path id="branch-r5" d="M305 140 Q280 110 250 80" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  
  <!-- Canopy leaves -->
