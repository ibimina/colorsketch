    <path id="bark-r2" d="M315 340 Q321 330 313 320" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="bark-r3" d="M310 290 Q317 280 311 270" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
