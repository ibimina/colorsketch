      <circle id="spot-1a" cx="193" cy="353" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      <circle id="spot-1b" cx="207" cy="352" r="2.5" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      <circle id="spot-1c" cx="200" cy="350" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
    </g>
    
    <g id="mushroom-2">
      <ellipse id="mush-cap-2" cx="215" cy="365" rx="12" ry="7" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <rect id="mush-stem-2" x="211" y="365" width="8" height="12" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
