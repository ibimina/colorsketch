      <circle id="spot-2b" cx="220" cy="362" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
    </g>
    
    <g id="mushroom-3">
      <ellipse id="mush-cap-3" cx="180" cy="380" rx="10" ry="6" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <rect id="mush-stem-3" x="177" y="380" width="6" height="10" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="spot-3a" cx="176" cy="378" r="1.5" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
      <circle id="spot-3b" cx="184" cy="378" r="1" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
    </g>
  </g>
  
  <!-- Fireflies/magical lights -->
  <g id="fireflies">
    <circle id="fly-1" cx="150" cy="250" r="3" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle id="fly-1-glow" cx="150" cy="250" r="6" fill="none" stroke="#1a1a1a" stroke-width="0.2"/>
    <circle id="fly-2" cx="250" cy="200" r="3" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle id="fly-2-glow" cx="250" cy="200" r="6" fill="none" stroke="#1a1a1a" stroke-width="0.2"/>
    <circle id="fly-3" cx="180" cy="180" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle id="fly-3-glow" cx="180" cy="180" r="5" fill="none" stroke="#1a1a1a" stroke-width="0.2"/>
    <circle id="fly-4" cx="230" cy="280" r="2.5" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle id="fly-4-glow" cx="230" cy="280" r="5" fill="none" stroke="#1a1a1a" stroke-width="0.2"/>
    <circle id="fly-5" cx="170" cy="320" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle id="fly-6" cx="260" cy="350" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <!-- Small flowers on forest floor -->
  <g id="forest-flowers">
    <circle id="ff-1" cx="140" cy="395" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    <circle id="ff-1c" cx="140" cy="395" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.2"/>
    <circle id="ff-2" cx="255" cy="390" r="3" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    <circle id="ff-2c" cx="255" cy="390" r="1.5" fill="white" stroke="#1a1a1a" stroke-width="0.2"/>
    <circle id="ff-3" cx="190" cy="385" r="3" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    <circle id="ff-3c" cx="190" cy="385" r="1.5" fill="white" stroke="#1a1a1a" stroke-width="0.2"/>
  </g>
  
  <!-- Owl in tree -->
