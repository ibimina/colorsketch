    <ellipse id="leaf-cluster-2" cx="30" cy="80" rx="22" ry="18" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <ellipse id="leaf-cluster-3" cx="60" cy="50" rx="20" ry="15" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <ellipse id="leaf-cluster-4" cx="140" cy="110" rx="28" ry="22" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <ellipse id="leaf-cluster-5" cx="160" cy="70" rx="25" ry="18" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <ellipse id="leaf-cluster-6" cx="200" cy="50" rx="30" ry="20" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <ellipse id="leaf-cluster-7" cx="250" cy="60" rx="25" ry="18" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <ellipse id="leaf-cluster-8" cx="280" cy="100" rx="28" ry="20" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <ellipse id="leaf-cluster-9" cx="360" cy="130" rx="25" ry="20" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <ellipse id="leaf-cluster-10" cx="370" cy="80" rx="22" ry="18" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <ellipse id="leaf-cluster-11" cx="350" cy="50" rx="20" ry="15" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  
  <!-- Forest floor path -->
