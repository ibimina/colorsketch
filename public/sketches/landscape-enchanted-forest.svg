      <path id="fern-stem-1" d="M120 400 Q125 380 130 360" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
      <path id="fern-leaf-1a" d="M122 390 Q115 385 118 380" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
      <path id="fern-leaf-1b" d="M125 380 Q118 375 121 370" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
      <path id="fern-leaf-1c" d="M127 370 Q135 365 132 360" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
      <path id="fern-leaf-1d" d="M124 385 Q131 382 130 377" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
    <g id="fern-2">
      <path id="fern-stem-2" d="M270 400 Q265 380 260 360" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
      <path id="fern-leaf-2a" d="M268 390 Q275 385 272 380" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
      <path id="fern-leaf-2b" d="M265 380 Q272 375 269 370" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
      <path id="fern-leaf-2c" d="M262 370 Q255 365 258 360" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
  </g>
  
  <!-- Mushrooms -->
