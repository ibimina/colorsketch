    <path id="mist-1" d="M20 400 L20 200 Q30 180 20 160 L25 160 Q35 180 25 200 L25 400" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="mist-2" d="M50 400 L50 180 Q60 160 50 140 L55 140 Q65 160 55 180 L55 400" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="mist-3" d="M370 400 L370 190 Q380 170 370 150 L375 150 Q385 170 375 190 L375 400" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <!-- Main tree left -->
  <g id="tree-left">
    <path id="trunk-left" d="M80 400 Q75 350 70 300 Q65 250 75 200 Q70 150 80 100 L95 100 Q105 150 100 200 Q110 250 105 300 Q100 350 95 400 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Bark texture -->
    <path id="bark-1" d="M82 380 Q88 370 84 360" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="bark-2" d="M90 340 Q96 330 88 320" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="bark-3" d="M85 290 Q92 280 86 270" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="bark-4" d="M88 230 Q95 220 89 210" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <!-- Branches -->
    <path id="branch-l1" d="M75 200 Q40 180 20 150" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path id="branch-l2" d="M80 160 Q50 140 30 100" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path id="branch-l3" d="M85 120 Q60 100 50 60" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path id="branch-l4" d="M95 180 Q120 150 150 130" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path id="branch-l5" d="M100 140 Q130 110 160 90" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  
  <!-- Main tree right -->
  <g id="tree-right">
    <path id="trunk-right" d="M305 400 Q300 350 295 300 Q290 250 300 200 Q295 150 305 120 L320 120 Q330 150 325 200 Q335 250 330 300 Q325 350 320 400 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Bark texture -->
