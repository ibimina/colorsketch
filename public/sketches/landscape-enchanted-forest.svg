      <ellipse id="mush-cap-1" cx="200" cy="355" rx="18" ry="10" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <rect id="mush-stem-1" x="195" y="355" width="10" height="15" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <ellipse id="mush-base-1" cx="200" cy="370" rx="8" ry="3" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
