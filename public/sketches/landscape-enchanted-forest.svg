    <ellipse id="owl-body" cx="85" cy="250" rx="12" ry="15" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <circle id="owl-head" cx="85" cy="235" r="10" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <circle id="owl-eye-l" cx="81" cy="233" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle id="owl-eye-r" cx="89" cy="233" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle id="owl-pupil-l" cx="81" cy="233" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
    <circle id="owl-pupil-r" cx="89" cy="233" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
    <path id="owl-beak" d="M85 238 L83 242 L85 241 L87 242 Z" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
    <path id="owl-ear-l" d="M76 228 Q78 222 82 227" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="owl-ear-r" d="M94 228 Q92 222 88 227" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
</svg>