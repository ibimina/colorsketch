  <path id="basket" d="M100 240 Q95 260 100 280 L160 280 Q165 260 160 240 Z" fill="white"/>
  <path id="basket-weave-1" d="M105 250 L155 250" fill="none"/>
  <path id="basket-weave-2" d="M102 260 L158 260" fill="none"/>
  <path id="basket-weave-3" d="M100 270 L160 270" fill="none"/>
  <path id="basket-handle" d="M105 240 Q130 210 155 240" fill="none" stroke-width="3"/>
  
  <!-- Flowers in basket -->
  <circle id="basket-flower-1" cx="115" cy="235" r="8" fill="white"/>
  <circle id="basket-flower-2" cx="130" cy="230" r="10" fill="white"/>
  <circle id="basket-flower-3" cx="145" cy="235" r="8" fill="white"/>
  <path id="basket-leaves" d="M120 240 Q125 235 130 240 Q135 235 140 240" fill="white"/>
  
  <!-- Head -->
  <ellipse id="head" cx="200" cy="95" rx="45" ry="50" fill="white"/>
  
  <!-- Hair - wavy with sun hat -->
  <path id="hair-under-hat" d="M155 95 Q160 120 160 145 Q155 170 160 190" fill="white"/>
  <path id="hair-under-hat-2" d="M245 95 Q240 120 240 145 Q245 170 240 190" fill="white"/>
  <path id="hair-strand-1" d="M160 110 Q150 140 155 175" fill="none"/>
  <path id="hair-strand-2" d="M240 110 Q250 140 245 175" fill="none"/>
  
  <!-- Sun hat -->
  <ellipse id="hat-brim" cx="200" cy="60" rx="70" ry="20" fill="white"/>
  <path id="hat-top" d="M155 60 Q150 30 200 20 Q250 30 245 60" fill="white"/>
  <path id="hat-ribbon" d="M155 50 Q200 60 245 50" fill="none" stroke-width="4"/>
  <path id="hat-bow" d="M250 50 Q270 40 275 50 Q270 60 250 55" fill="white"/>
  
  <!-- Face -->
  <!-- Eyes -->
  <ellipse id="eye-left" cx="180" cy="95" rx="8" ry="10" fill="white"/>
