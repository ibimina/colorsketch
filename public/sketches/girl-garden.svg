  <circle id="pupil-left" cx="182" cy="97" r="5" fill="white"/>
  <circle id="pupil-right" cx="222" cy="97" r="5" fill="white"/>
  <circle id="sparkle-left" cx="179" cy="93" r="2" fill="white"/>
  <circle id="sparkle-right" cx="219" cy="93" r="2" fill="white"/>
  
  <!-- Eyebrows -->
  <path id="eyebrow-left" d="M170 82 Q180 78 190 82" fill="none"/>
  <path id="eyebrow-right" d="M210 82 Q220 78 230 82" fill="none"/>
  
  <!-- Nose -->
  <path id="nose" d="M200 100 Q203 108 200 115" fill="none"/>
  
  <!-- Mouth - happy smile -->
  <path id="mouth" d="M188 122 Q200 132 212 122" fill="none"/>
  
  <!-- Blush -->
  <ellipse id="blush-left" cx="168" cy="110" rx="8" ry="4" fill="white" stroke-dasharray="2,2"/>
  <ellipse id="blush-right" cx="232" cy="110" rx="8" ry="4" fill="white" stroke-dasharray="2,2"/>
  
  <!-- Butterfly -->
  <path id="butterfly-wing-left" d="M50 150 Q35 135 45 120 Q60 125 55 145" fill="white"/>
  <path id="butterfly-wing-right" d="M55 145 Q70 125 80 130 Q75 150 60 150" fill="white"/>
  <ellipse id="butterfly-body" cx="55" cy="147" rx="3" ry="10" fill="white"/>
  <path id="butterfly-antenna" d="M53 138 Q48 130 50 125 M57 138 Q62 130 60 125" fill="none"/>
  
  <!-- Small flowers in grass -->
  <circle id="grass-flower-1" cx="180" cy="355" r="5" fill="white"/>
  <circle id="grass-flower-2" cx="100" cy="358" r="4" fill="white"/>
  <circle id="grass-flower-3" cx="300" cy="352" r="5" fill="white"/>
  
  <!-- Grass blades -->
  <path id="grass-1" d="M190 360 Q195 350 200 360" fill="none"/>
  <path id="grass-2" d="M108 362 Q112 355 116 362" fill="none"/>
  <path id="grass-3" d="M308 358 Q312 350 316 358" fill="none"/>
</svg>