<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Girl in the Garden -->
  
  <!-- Sun -->
  <circle id="sun" cx="350" cy="50" r="25" fill="white"/>
  <path id="sun-ray-1" d="M350 15 L350 5" fill="none" stroke-width="3"/>
  <path id="sun-ray-2" d="M375 25 L385 15" fill="none" stroke-width="3"/>
  <path id="sun-ray-3" d="M385 50 L395 50" fill="none" stroke-width="3"/>
  <path id="sun-ray-4" d="M375 75 L385 85" fill="none" stroke-width="3"/>
  
  <!-- Cloud -->
  <ellipse id="cloud-1" cx="280" cy="45" rx="25" ry="15" fill="white"/>
  <ellipse id="cloud-2" cx="260" cy="50" rx="20" ry="12" fill="white"/>
  <ellipse id="cloud-3" cx="300" cy="50" rx="18" ry="10" fill="white"/>
  
  <!-- Ground -->
  <path id="ground" d="M0 350 Q100 340 200 345 Q300 350 400 345" fill="none"/>
  
