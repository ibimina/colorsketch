  <ellipse id="petal-left-2" cx="50" cy="225" rx="12" ry="18" fill="white" transform="rotate(-60 70 230)"/>
  <ellipse id="petal-left-3" cx="55" cy="250" rx="12" ry="18" fill="white" transform="rotate(-120 70 230)"/>
  <ellipse id="petal-left-4" cx="85" cy="255" rx="12" ry="18" fill="white" transform="rotate(120 70 230)"/>
  <ellipse id="petal-left-5" cx="90" cy="225" rx="12" ry="18" fill="white" transform="rotate(60 70 230)"/>
  
  <!-- Tulips right side -->
  <path id="tulip-stem-1" d="M340 360 L340 280" fill="none" stroke-width="2"/>
