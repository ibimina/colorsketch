  <path id="dress-fold-1" d="M170 220 L165 340" fill="none"/>
  <path id="dress-fold-2" d="M230 220 L235 340" fill="none"/>
  
  <!-- Apron -->
  <path id="apron" d="M165 210 Q160 270 155 320 Q200 330 245 320 Q240 270 235 210" fill="white"/>
  <path id="apron-pocket" d="M180 260 L220 260 L218 290 L182 290 Z" fill="white"/>
