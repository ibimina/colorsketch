  <path id="tulip-stem-2" d="M360 355 L360 300" fill="none" stroke-width="2"/>
  <path id="tulip-2" d="M345 300 Q360 270 375 300 Q360 310 345 300" fill="white"/>
  
  <!-- Girl -->
  <!-- Dress -->
  <path id="dress" d="M160 200 Q140 280 130 350 L270 350 Q260 280 240 200" fill="white"/>
  <path id="dress-pattern-1" d="M150 250 Q200 245 250 250" fill="none" stroke-dasharray="4,4"/>
