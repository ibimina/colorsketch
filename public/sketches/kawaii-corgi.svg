<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Kawaii Corgi Dog -->
  
  <!-- Body -->
  <ellipse id="body" cx="200" cy="280" rx="100" ry="60" fill="white"/>
  
  <!-- Chest/belly marking -->
  <path id="belly-marking" d="M160 255 Q200 230 240 255 Q200 320 160 255" fill="white" stroke-dasharray="3,3"/>
  
  <!-- Back legs -->
  <rect id="back-leg-left" x="115" y="310" width="35" height="50" rx="10" fill="white"/>
  <rect id="back-leg-right" x="250" y="310" width="35" height="50" rx="10" fill="white"/>
  
  <!-- Front legs -->
  <rect id="front-leg-left" x="145" y="305" width="30" height="55" rx="8" fill="white"/>
  <rect id="front-leg-right" x="225" y="305" width="30" height="55" rx="8" fill="white"/>
  
  <!-- Paws -->
  <ellipse id="paw-back-left" cx="132" cy="362" rx="20" ry="10" fill="white"/>
  <ellipse id="paw-back-right" cx="268" cy="362" rx="20" ry="10" fill="white"/>
  <ellipse id="paw-front-left" cx="160" cy="362" rx="18" ry="10" fill="white"/>
  <ellipse id="paw-front-right" cx="240" cy="362" rx="18" ry="10" fill="white"/>
  
  <!-- Paw details -->
  <path id="paw-line-1" d="M125 365 L125 358 M132 365 L132 358 M139 365 L139 358" fill="none"/>
  <path id="paw-line-2" d="M261 365 L261 358 M268 365 L268 358 M275 365 L275 358" fill="none"/>
  <path id="paw-line-3" d="M153 365 L153 358 M160 365 L160 358 M167 365 L167 358" fill="none"/>
  <path id="paw-line-4" d="M233 365 L233 358 M240 365 L240 358 M247 365 L247 358" fill="none"/>
  
  <!-- Tail (corgi fluffy butt) -->
  <ellipse id="butt-fluff" cx="295" cy="260" rx="25" ry="30" fill="white"/>
  <path id="butt-fluff-detail" d="M290 240 Q295 235 300 240 M285 255 Q290 250 295 255 M290 270 Q295 265 300 270" fill="none"/>
  
  <!-- Neck -->
  <path id="neck" d="M165 240 Q180 200 200 190 Q220 200 235 240" fill="white"/>
  
  <!-- Head -->
  <ellipse id="head" cx="200" cy="140" rx="65" ry="55" fill="white"/>
  
  <!-- Face mask (white marking) -->
  <path id="face-mask" d="M170 120 Q200 100 230 120 L225 175 Q200 190 175 175 Z" fill="white" stroke-dasharray="3,3"/>
  
  <!-- Ears -->
  <path id="ear-left" d="M135 130 Q115 80 130 50 Q155 55 165 90 Q160 115 145 130" fill="white"/>
  <path id="ear-right" d="M265 130 Q285 80 270 50 Q245 55 235 90 Q240 115 255 130" fill="white"/>
  <path id="ear-inner-left" d="M145 110 Q140 85 148 65" fill="none"/>
  <path id="ear-inner-right" d="M255 110 Q260 85 252 65" fill="none"/>
  
  <!-- Eyes -->
  <ellipse id="eye-left" cx="175" cy="130" rx="15" ry="18" fill="white"/>
  <ellipse id="eye-right" cx="225" cy="130" rx="15" ry="18" fill="white"/>
  <circle id="pupil-left" cx="178" cy="133" r="9" fill="white"/>
  <circle id="pupil-right" cx="228" cy="133" r="9" fill="white"/>
  <circle id="sparkle-left-1" cx="172" cy="125" r="4" fill="white"/>
  <circle id="sparkle-left-2" cx="182" cy="137" r="2" fill="white"/>
  <circle id="sparkle-right-1" cx="222" cy="125" r="4" fill="white"/>
  <circle id="sparkle-right-2" cx="232" cy="137" r="2" fill="white"/>
  
  <!-- Eyebrows -->
  <path id="eyebrow-left" d="M162 108 Q175 102 188 108" fill="none"/>
  <path id="eyebrow-right" d="M212 108 Q225 102 238 108" fill="none"/>
  
  <!-- Nose -->
  <ellipse id="nose" cx="200" cy="160" rx="10" ry="8" fill="white"/>
  <path id="nose-shine" d="M195 157 Q198 155 200 157" fill="none"/>
  
  <!-- Mouth -->
  <path id="mouth-line" d="M200 168 L200 178" fill="none"/>
  <path id="mouth-left" d="M185 180 Q192 188 200 178" fill="none"/>
  <path id="mouth-right" d="M200 178 Q208 188 215 180" fill="none"/>
  
  <!-- Tongue -->
  <path id="tongue" d="M192 182 Q200 200 208 182" fill="white"/>
  <path id="tongue-line" d="M200 185 L200 195" fill="none"/>
  
  <!-- Blush -->
  <ellipse id="blush-left" cx="152" cy="150" rx="12" ry="6" fill="white" stroke-dasharray="2,2"/>
  <ellipse id="blush-right" cx="248" cy="150" rx="12" ry="6" fill="white" stroke-dasharray="2,2"/>
  
  <!-- Collar -->
  <path id="collar" d="M165 195 Q200 210 235 195" fill="none" stroke-width="4"/>
  <circle id="collar-tag" cx="200" cy="208" r="10" fill="white"/>
  <path id="tag-bone" d="M195 208 L205 208 M200 203 L200 213" fill="none"/>
  
  <!-- Hearts -->
  <path id="heart-1" d="M80 100 Q85 95 90 100 Q95 95 100 100 Q100 110 90 118 Q80 110 80 100" fill="white"/>
  <path id="heart-2" d="M310 120 Q313 117 316 120 Q319 117 322 120 Q322 126 316 131 Q310 126 310 120" fill="white"/>
  
  <!-- Paw prints -->
  <ellipse id="pawprint-1-main" cx="50" cy="320" rx="10" ry="8" fill="white"/>
  <circle id="pawprint-1-toe-1" cx="42" cy="308" r="4" fill="white"/>
  <circle id="pawprint-1-toe-2" cx="50" cy="305" r="4" fill="white"/>
  <circle id="pawprint-1-toe-3" cx="58" cy="308" r="4" fill="white"/>
  
  <ellipse id="pawprint-2-main" cx="350" cy="300" rx="8" ry="6" fill="white"/>
  <circle id="pawprint-2-toe-1" cx="344" cy="290" r="3" fill="white"/>
  <circle id="pawprint-2-toe-2" cx="350" cy="288" r="3" fill="white"/>
  <circle id="pawprint-2-toe-3" cx="356" cy="290" r="3" fill="white"/>
</svg>