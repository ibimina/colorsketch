<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Spirograph Pattern - Adult Coloring -->
  
  <!-- Background -->
  <rect id="background" x="0" y="0" width="400" height="400" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Outer circular border -->
  <circle id="outer-border" cx="200" cy="200" r="190" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Main spirograph pattern - many overlapping circles creating flower effect -->
  <g id="spirograph">
    <ellipse id="spiro-1" cx="200" cy="140" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <ellipse id="spiro-2" cx="200" cy="140" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(15 200 200)"/>
    <ellipse id="spiro-3" cx="200" cy="140" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(30 200 200)"/>
    <ellipse id="spiro-4" cx="200" cy="140" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(45 200 200)"/>
    <ellipse id="spiro-5" cx="200" cy="140" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(60 200 200)"/>
    <ellipse id="spiro-6" cx="200" cy="140" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(75 200 200)"/>
    <ellipse id="spiro-7" cx="200" cy="140" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(90 200 200)"/>
    <ellipse id="spiro-8" cx="200" cy="140" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(105 200 200)"/>
    <ellipse id="spiro-9" cx="200" cy="140" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(120 200 200)"/>
    <ellipse id="spiro-10" cx="200" cy="140" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(135 200 200)"/>
    <ellipse id="spiro-11" cx="200" cy="140" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(150 200 200)"/>
    <ellipse id="spiro-12" cx="200" cy="140" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(165 200 200)"/>
  </g>
  
  <!-- Inner spirograph layer -->
  <g id="spirograph-inner">
    <ellipse id="spiro-inner-1" cx="200" cy="155" rx="55" ry="45" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
    <ellipse id="spiro-inner-2" cx="200" cy="155" rx="55" ry="45" fill="white" stroke="#1a1a1a" stroke-width="0.6" transform="rotate(20 200 200)"/>
    <ellipse id="spiro-inner-3" cx="200" cy="155" rx="55" ry="45" fill="white" stroke="#1a1a1a" stroke-width="0.6" transform="rotate(40 200 200)"/>
    <ellipse id="spiro-inner-4" cx="200" cy="155" rx="55" ry="45" fill="white" stroke="#1a1a1a" stroke-width="0.6" transform="rotate(60 200 200)"/>
    <ellipse id="spiro-inner-5" cx="200" cy="155" rx="55" ry="45" fill="white" stroke="#1a1a1a" stroke-width="0.6" transform="rotate(80 200 200)"/>
    <ellipse id="spiro-inner-6" cx="200" cy="155" rx="55" ry="45" fill="white" stroke="#1a1a1a" stroke-width="0.6" transform="rotate(100 200 200)"/>
    <ellipse id="spiro-inner-7" cx="200" cy="155" rx="55" ry="45" fill="white" stroke="#1a1a1a" stroke-width="0.6" transform="rotate(120 200 200)"/>
    <ellipse id="spiro-inner-8" cx="200" cy="155" rx="55" ry="45" fill="white" stroke="#1a1a1a" stroke-width="0.6" transform="rotate(140 200 200)"/>
    <ellipse id="spiro-inner-9" cx="200" cy="155" rx="55" ry="45" fill="white" stroke="#1a1a1a" stroke-width="0.6" transform="rotate(160 200 200)"/>
  </g>
  
  <!-- Core spirograph -->
  <g id="spirograph-core">
    <ellipse id="spiro-core-1" cx="200" cy="170" rx="35" ry="30" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <ellipse id="spiro-core-2" cx="200" cy="170" rx="35" ry="30" fill="white" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(30 200 200)"/>
    <ellipse id="spiro-core-3" cx="200" cy="170" rx="35" ry="30" fill="white" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(60 200 200)"/>
    <ellipse id="spiro-core-4" cx="200" cy="170" rx="35" ry="30" fill="white" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(90 200 200)"/>
    <ellipse id="spiro-core-5" cx="200" cy="170" rx="35" ry="30" fill="white" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(120 200 200)"/>
    <ellipse id="spiro-core-6" cx="200" cy="170" rx="35" ry="30" fill="white" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(150 200 200)"/>
  </g>
  
  <!-- Center circles -->
  <circle id="center-1" cx="200" cy="200" r="25" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <circle id="center-2" cx="200" cy="200" r="18" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle id="center-3" cx="200" cy="200" r="10" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle id="center-dot" cx="200" cy="200" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
</svg>