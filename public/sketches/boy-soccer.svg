<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Boy Playing Soccer -->
  
  <!-- Ground -->
  <path id="ground" d="M0 370 L400 370" fill="none"/>
  <path id="grass-line-1" d="M50 370 Q55 360 60 370" fill="none"/>
  <path id="grass-line-2" d="M150 370 Q155 362 160 370" fill="none"/>
  <path id="grass-line-3" d="M280 370 Q285 365 290 370" fill="none"/>
  <path id="grass-line-4" d="M350 370 Q355 360 360 370" fill="none"/>
  
  <!-- Soccer ball -->
  <circle id="ball" cx="320" cy="340" r="25" fill="white"/>
  <path id="ball-pentagon-1" d="M320 320 L335 330 L330 348 L310 348 L305 330 Z" fill="white"/>
  <path id="ball-pattern-1" d="M320 315 L320 320" fill="none"/>
  <path id="ball-pattern-2" d="M340 328 L335 330" fill="none"/>
  <path id="ball-pattern-3" d="M335 355 L330 348" fill="none"/>
  <path id="ball-pattern-4" d="M305 355 L310 348" fill="none"/>
  <path id="ball-pattern-5" d="M300 328 L305 330" fill="none"/>
  
  <!-- Motion lines for ball -->
  <path id="motion-ball-1" d="M355 330 L370 325" fill="none" stroke-dasharray="4,4"/>
  <path id="motion-ball-2" d="M355 345 L368 348" fill="none" stroke-dasharray="4,4"/>
  
  <!-- Boy - kicking pose -->
  <!-- Back leg (standing) -->
  <path id="leg-standing" d="M170 280 L165 340 L160 365" fill="white"/>
  <rect id="leg-standing-fill" x="158" y="280" width="18" height="85" rx="8" fill="white"/>
  
  <!-- Kicking leg (extended) -->
  <path id="leg-kicking" d="M190 275 Q230 290 280 320" fill="none" stroke-width="16" stroke="white"/>
  <path id="leg-kicking-outline" d="M190 275 Q230 290 280 320" fill="none" stroke-width="2"/>
  
  <!-- Foot standing -->
  <ellipse id="foot-standing" cx="160" cy="367" rx="20" ry="8" fill="white"/>
  <path id="shoe-detail-1" d="M145 367 L150 360" fill="none"/>
  
  <!-- Foot kicking -->
  <ellipse id="foot-kicking" cx="290" cy="320" rx="22" ry="10" fill="white" transform="rotate(-15 290 320)"/>
  <path id="shoe-detail-2" d="M305 315 L310 310" fill="none"/>
  
  <!-- Shorts -->
  <path id="shorts" d="M145 240 L140 285 Q175 295 210 285 L205 240 Z" fill="white"/>
  <path id="shorts-line" d="M175 245 L175 280" fill="none"/>
  
  <!-- Body/Jersey -->
  <path id="jersey" d="M150 150 L145 245 Q175 255 205 245 L200 150" fill="white"/>
  <path id="jersey-number" d="M165 185 L185 185 M175 175 L175 205" fill="none" stroke-width="3"/>
  
  <!-- Jersey collar -->
  <path id="collar" d="M160 150 Q175 160 190 150" fill="none" stroke-width="3"/>
  
  <!-- Arms -->
  <path id="arm-left" d="M150 160 Q120 180 100 170 Q95 175 100 185" fill="white"/>
  <path id="arm-right" d="M200 160 Q230 150 250 165 Q255 160 260 170" fill="white"/>
  
  <!-- Hands -->
  <ellipse id="hand-left" cx="100" cy="182" rx="10" ry="8" fill="white"/>
  <ellipse id="hand-right" cx="258" cy="168" rx="10" ry="8" fill="white"/>
  
  <!-- Head -->
  <ellipse id="head" cx="175" cy="100" rx="42" ry="48" fill="white"/>
  
  <!-- Hair - sporty short -->
  <path id="hair" d="M133 95 Q130 60 175 45 Q220 60 217 95" fill="white"/>
  <path id="hair-spikes-1" d="M145 60 Q150 45 160 55" fill="white"/>
  <path id="hair-spikes-2" d="M165 50 Q175 35 185 50" fill="white"/>
  <path id="hair-spikes-3" d="M190 55 Q200 42 205 58" fill="white"/>
  <path id="hair-detail" d="M145 75 Q155 70 165 75 Q175 68 185 75 Q195 68 205 75" fill="none"/>
  
  <!-- Face -->
  <!-- Eyes - determined look -->
  <ellipse id="eye-left" cx="158" cy="95" rx="10" ry="12" fill="white"/>
  <ellipse id="eye-right" cx="192" cy="95" rx="10" ry="12" fill="white"/>
  <circle id="pupil-left" cx="161" cy="97" r="6" fill="white"/>
  <circle id="pupil-right" cx="195" cy="97" r="6" fill="white"/>
  <circle id="sparkle-left" cx="157" cy="92" r="3" fill="white"/>
  <circle id="sparkle-right" cx="191" cy="92" r="3" fill="white"/>
  
  <!-- Eyebrows - determined -->
  <path id="eyebrow-left" d="M148 80 Q158 75 170 82" fill="none" stroke-width="2.5"/>
  <path id="eyebrow-right" d="M180 82 Q192 75 202 80" fill="none" stroke-width="2.5"/>
  
  <!-- Nose -->
  <path id="nose" d="M175 100 Q178 110 175 118" fill="none"/>
  
  <!-- Mouth - determined/effort -->
  <path id="mouth" d="M162 128 Q175 135 188 128" fill="none" stroke-width="2"/>
  
  <!-- Sweat drops -->
  <path id="sweat-1" d="M220 80 Q225 90 220 95 Q215 90 220 80" fill="white"/>
  <path id="sweat-2" d="M130 100 Q133 107 130 112 Q127 107 130 100" fill="white"/>
  
  <!-- Motion lines (running/kicking) -->
  <path id="motion-1" d="M80 200 L60 200" fill="none" stroke-dasharray="5,5"/>
  <path id="motion-2" d="M85 220 L55 220" fill="none" stroke-dasharray="5,5"/>
  <path id="motion-3" d="M80 240 L65 240" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Goal post in background -->
  <path id="goalpost-left" d="M30 250 L30 370" fill="none" stroke-width="4"/>
  <path id="goalpost-right" d="M100 250 L100 370" fill="none" stroke-width="4"/>
  <path id="goalpost-top" d="M30 250 L100 250" fill="none" stroke-width="4"/>
  <path id="net-1" d="M35 255 L35 365" fill="none" stroke-dasharray="3,5"/>
  <path id="net-2" d="M50 255 L50 365" fill="none" stroke-dasharray="3,5"/>
  <path id="net-3" d="M65 255 L65 365" fill="none" stroke-dasharray="3,5"/>
  <path id="net-4" d="M80 255 L80 365" fill="none" stroke-dasharray="3,5"/>
  <path id="net-5" d="M95 255 L95 365" fill="none" stroke-dasharray="3,5"/>
</svg>