<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Girl Coming Back from School -->
  
  <!-- Ground/Path -->
  <path id="ground" d="M0 380 Q200 375 400 380" fill="none"/>
  
  <!-- Shoes -->
  <ellipse id="shoe-left" cx="175" cy="375" rx="20" ry="8" fill="white"/>
  <ellipse id="shoe-right" cx="230" cy="370" rx="20" ry="8" fill="white"/>
  <path id="shoe-left-detail" d="M160 375 L165 368" fill="none"/>
  <path id="shoe-right-detail" d="M215 370 L220 363" fill="none"/>
  
  <!-- Socks -->
  <rect id="sock-left" x="168" y="355" width="14" height="20" rx="3" fill="white"/>
  <rect id="sock-right" x="223" y="350" width="14" height="20" rx="3" fill="white"/>
  <path id="sock-left-line" d="M168 362 L182 362" fill="none" stroke-dasharray="2,2"/>
  <path id="sock-right-line" d="M223 357 L237 357" fill="none" stroke-dasharray="2,2"/>
  
  <!-- Legs -->
  <path id="leg-left" d="M175 280 L175 355" fill="none" stroke-width="12" stroke="white"/>
  <path id="leg-right" d="M225 280 L230 350" fill="none" stroke-width="12" stroke="white"/>
  <path id="leg-left-outline" d="M169 280 L169 355 M181 280 L181 355" fill="none"/>
  <path id="leg-right-outline" d="M219 280 L224 350 M231 280 L236 350" fill="none"/>
  
  <!-- Skirt (school uniform) -->
  <path id="skirt" d="M150 230 L140 285 Q200 295 260 285 L250 230" fill="white"/>
  <path id="skirt-pleat-1" d="M160 235 L155 280" fill="none"/>
  <path id="skirt-pleat-2" d="M185 235 L180 285" fill="none"/>
  <path id="skirt-pleat-3" d="M215 235 L220 285" fill="none"/>
  <path id="skirt-pleat-4" d="M240 235 L245 280" fill="none"/>
  
  <!-- Body/Blouse -->
  <path id="blouse" d="M160 150 L150 235 Q200 245 250 235 L240 150" fill="white"/>
  
  <!-- Collar -->
  <path id="collar-left" d="M185 150 L160 175 L190 185" fill="white"/>
  <path id="collar-right" d="M215 150 L240 175 L210 185" fill="white"/>
  <path id="tie" d="M195 175 L200 220 L205 175 L200 185 Z" fill="white"/>
  
  <!-- Arms -->
  <path id="arm-left" d="M155 160 Q130 190 120 240 Q115 260 125 280" fill="white" stroke-width="10" stroke="white"/>
  <path id="arm-left-outline" d="M155 160 Q130 190 120 240 Q115 260 125 280" fill="none"/>
  <path id="arm-right" d="M245 160 Q260 180 265 200 Q268 220 260 235" fill="white" stroke-width="10" stroke="white"/>
  <path id="arm-right-outline" d="M245 160 Q260 180 265 200 Q268 220 260 235" fill="none"/>
  
  <!-- Hand left (holding bag strap) -->
  <ellipse id="hand-left" cx="125" cy="285" rx="12" ry="10" fill="white"/>
  <path id="fingers-left" d="M118 290 L115 295 M123 292 L122 298 M128 292 L130 298" fill="none"/>
  
  <!-- Hand right (waving) -->
  <ellipse id="hand-right" cx="265" cy="235" rx="12" ry="10" fill="white"/>
  <path id="fingers-right" d="M270 228 L275 222 M265 227 L267 220 M260 228 L258 222 M255 232 L250 228" fill="none"/>
  
  <!-- School bag -->
  <rect id="bag-main" x="85" y="240" width="50" height="60" rx="5" fill="white"/>
  <rect id="bag-flap" x="85" y="235" width="50" height="25" rx="5" fill="white"/>
  <rect id="bag-pocket" x="95" y="270" width="30" height="20" rx="3" fill="white"/>
  <ellipse id="bag-buckle" cx="110" cy="260" rx="8" ry="5" fill="white"/>
  <path id="bag-strap" d="M110 240 Q120 200 135 170 Q145 160 155 160" fill="none" stroke-width="3"/>
  
  <!-- Head -->
  <ellipse id="head" cx="200" cy="100" rx="45" ry="50" fill="white"/>
  
  <!-- Hair - twin tails -->
  <path id="hair-top" d="M155 100 Q150 50 200 40 Q250 50 245 100" fill="white"/>
  <path id="hair-bangs" d="M160 80 Q170 95 180 80 Q190 95 200 80 Q210 95 220 80 Q230 95 240 85" fill="white"/>
  
  <!-- Twin tails -->
  <path id="twintail-left" d="M155 90 Q130 100 120 140 Q115 180 125 220" fill="white"/>
  <path id="twintail-left-inner" d="M155 95 Q135 105 128 140 Q125 175 132 210" fill="none"/>
  <path id="twintail-right" d="M245 90 Q270 100 280 140 Q285 180 275 220" fill="white"/>
  <path id="twintail-right-inner" d="M245 95 Q265 105 272 140 Q275 175 268 210" fill="none"/>
  
  <!-- Hair ties -->
  <ellipse id="hair-tie-left" cx="150" cy="88" rx="8" ry="6" fill="white"/>
  <ellipse id="hair-tie-right" cx="250" cy="88" rx="8" ry="6" fill="white"/>
  
  <!-- Face -->
  <!-- Eyes (happy, closed) -->
  <path id="eye-left" d="M175 100 Q185 90 195 100" fill="none" stroke-width="2.5"/>
  <path id="eye-right" d="M205 100 Q215 90 225 100" fill="none" stroke-width="2.5"/>
  
  <!-- Nose -->
  <path id="nose" d="M200 108 Q202 112 200 116" fill="none"/>
  
  <!-- Mouth - big happy smile -->
  <path id="mouth" d="M185 125 Q200 140 215 125" fill="white"/>
  <path id="mouth-line" d="M185 125 Q200 140 215 125" fill="none"/>
  <path id="tongue" d="M195 130 Q200 138 205 130" fill="white"/>
  
  <!-- Blush -->
  <ellipse id="blush-left" cx="168" cy="115" rx="10" ry="5" fill="white" stroke-dasharray="2,2"/>
  <ellipse id="blush-right" cx="232" cy="115" rx="10" ry="5" fill="white" stroke-dasharray="2,2"/>
  
  <!-- Motion lines (walking) -->
  <path id="motion-1" d="M290 300 L310 300" fill="none" stroke-dasharray="5,5"/>
  <path id="motion-2" d="M295 320 L320 320" fill="none" stroke-dasharray="5,5"/>
  <path id="motion-3" d="M288 340 L305 340" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Musical notes (happy mood) -->
  <path id="note-1" d="M300 80 L300 60 Q310 55 310 65 Q310 72 305 72 Q300 72 300 68" fill="white"/>
  <path id="note-2" d="M320 95 L320 75 Q330 70 330 80 Q330 87 325 87 Q320 87 320 83" fill="white"/>
  
  <!-- Small flowers on ground -->
  <circle id="flower-ground-1" cx="80" cy="378" r="5" fill="white"/>
  <circle id="flower-ground-2" cx="340" cy="376" r="4" fill="white"/>
  <path id="grass-1" d="M70 380 Q75 370 80 380" fill="none"/>
  <path id="grass-2" d="M330 380 Q335 372 340 380" fill="none"/>
</svg>