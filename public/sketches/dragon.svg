<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Dragon - Fantasy Style -->
  
  <!-- Wings -->
  <path id="wing-left" d="M100 150 Q50 100 30 130 Q20 160 40 180 L60 170 Q45 185 50 200 L75 185 Q60 205 70 220 L100 200 Q90 220 100 235 L130 210 Q150 200 160 180 Q155 165 140 160 Q120 155 100 150" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M100 150 L60 170 M100 150 L75 185 M100 150 L100 200 M100 150 L130 210" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <path id="wing-right" d="M300 150 Q350 100 370 130 Q380 160 360 180 L340 170 Q355 185 350 200 L325 185 Q340 205 330 220 L300 200 Q310 220 300 235 L270 210 Q250 200 240 180 Q245 165 260 160 Q280 155 300 150" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M300 150 L340 170 M300 150 L325 185 M300 150 L300 200 M300 150 L270 210" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <!-- Body -->
  <ellipse id="body" cx="200" cy="260" rx="80" ry="60" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Belly plates -->
  <path id="belly-plate-1" d="M160 250 Q200 240 240 250" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <path id="belly-plate-2" d="M155 270 Q200 260 245 270" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <path id="belly-plate-3" d="M160 290 Q200 280 240 290" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <!-- Neck -->
  <path id="neck" d="M175 200 Q165 160 180 130 Q220 130 235 160 Q245 200 225 200" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Head -->
  <path id="head" d="M180 130 Q150 100 140 70 Q140 45 170 40 Q200 35 230 40 Q260 45 260 70 Q250 100 220 130" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
