  <ellipse id="nostril-2" cx="155" cy="88" rx="4" ry="3" fill="#1a1a1a"/>
  
  <!-- Horns -->
  <path id="horn-left" d="M175 45 Q165 20 180 10 Q190 15 185 40" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <path id="horn-right" d="M225 45 Q235 20 220 10 Q210 15 215 40" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Small horns/spikes -->
  <path id="spike-1" d="M190 40 L195 25 L200 40" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <path id="spike-2" d="M205 40 L208 28 L211 40" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <!-- Eyes -->
  <ellipse id="eye-left" cx="175" cy="70" rx="12" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <ellipse cx="177" cy="72" rx="6" ry="8" fill="#1a1a1a"/>
  <circle cx="179" cy="69" r="2.5" fill="white"/>
  
  <ellipse id="eye-right" cx="215" cy="70" rx="12" ry="15" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <ellipse cx="213" cy="72" rx="6" ry="8" fill="#1a1a1a"/>
  <circle cx="211" cy="69" r="2.5" fill="white"/>
  
  <!-- Brow ridges -->
  <path d="M160 55 Q175 48 185 58" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M240 55 Q225 48 215 58" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Mouth -->
  <path d="M145 105 Q170 115 190 108" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Ears/frills -->
  <path id="frill-left" d="M155 55 Q135 50 125 65 Q128 80 145 85" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <path id="frill-right" d="M245 55 Q265 50 275 65 Q272 80 255 85" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Back spines -->
  <path id="spine-1" d="M195 195 L200 175 L205 195" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <path id="spine-2" d="M210 200 L218 178 L226 200" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Front legs -->
  <path id="leg-front-left" d="M145 290 Q135 320 140 355 Q148 370 160 370 Q172 370 175 355 Q180 320 170 290" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M145 368 L143 378 M155 370 L155 380 M167 368 L169 378" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  
  <path id="leg-front-right" d="M230 290 Q240 320 235 355 Q227 370 215 370 Q203 370 200 355 Q195 320 205 290" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M230 368 L232 378 M220 370 L220 380 M208 368 L206 378" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  
  <!-- Tail -->
  <path id="tail" d="M275 270 Q310 280 340 260 Q370 240 380 260 Q375 280 355 285 Q330 290 305 295" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <path id="tail-spike" d="M380 260 Q395 250 390 235 Q385 250 375 255" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Fire breath effect -->
  <path id="fire-1" d="M125 95 Q100 90 85 100 Q75 115 90 120" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <path id="fire-2" d="M90 120 Q70 115 55 125 Q50 140 70 140" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
