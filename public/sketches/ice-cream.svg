<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Ice Cream Cone - Kawaii Style -->
  
  <!-- Ice cream scoops -->
  <!-- Top scoop -->
  <circle id="scoop-top" cx="200" cy="80" r="50" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M160 70 Q175 60 190 70" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <path d="M175 90 Q190 85 205 90" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <!-- Middle scoop -->
  <circle id="scoop-middle" cx="200" cy="150" r="55" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M155 140 Q175 130 195 140" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <path d="M205 160 Q225 155 245 160" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <!-- Bottom scoop -->
  <circle id="scoop-bottom" cx="200" cy="225" r="60" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M150 215 Q175 205 200 215" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <path d="M200 235 Q225 230 250 235" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <!-- Drips -->
  <path id="drip-1" d="M145 230 Q140 250 145 270 Q150 280 155 275 Q158 265 155 250 Q152 235 145 230" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <path id="drip-2" d="M255 225 Q260 245 257 260 Q252 270 247 265 Q244 255 248 240 Q252 230 255 225" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <path id="drip-3" d="M180 275 Q175 290 180 305 Q185 312 190 307 Q193 297 190 285 Q185 278 180 275" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Toppings - sprinkles -->
  <ellipse id="sprinkle-1" cx="175" cy="70" rx="3" ry="7" transform="rotate(30 175 70)" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  <ellipse id="sprinkle-2" cx="220" cy="75" rx="3" ry="7" transform="rotate(-45 220 75)" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  <ellipse id="sprinkle-3" cx="160" cy="145" rx="3" ry="7" transform="rotate(60 160 145)" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  <ellipse id="sprinkle-4" cx="240" cy="155" rx="3" ry="7" transform="rotate(-30 240 155)" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  <ellipse id="sprinkle-5" cx="155" cy="220" rx="3" ry="7" transform="rotate(45 155 220)" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  <ellipse id="sprinkle-6" cx="245" cy="215" rx="3" ry="7" transform="rotate(-60 245 215)" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  
  <!-- Cherry on top -->
  <circle id="cherry" cx="200" cy="35" r="18" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <path id="cherry-stem" d="M200 20 Q210 10 220 15 Q225 20 222 28" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  <ellipse cx="195" cy="30" rx="4" ry="3" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
  
  <!-- Cone -->
  <path id="cone" d="M145 275 L200 390 L255 275" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Cone waffle pattern -->
  <path d="M150 285 L220 350 M165 280 L240 360 M180 280 L255 355 M195 280 L255 335 M210 280 L255 315" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <path d="M250 285 L180 350 M235 280 L160 360 M220 280 L145 355 M205 280 L145 335 M190 280 L145 315" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <!-- Kawaii face on middle scoop -->
  <circle id="eye-left" cx="175" cy="145" r="10" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="177" cy="146" r="5" fill="#1a1a1a"/>
  <circle cx="179" cy="144" r="2" fill="white"/>
  
  <circle id="eye-right" cx="225" cy="145" r="10" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="223" cy="146" r="5" fill="#1a1a1a"/>
  <circle cx="221" cy="144" r="2" fill="white"/>
  
  <!-- Blush -->
  <ellipse id="blush-left" cx="158" cy="160" rx="8" ry="5" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  <ellipse id="blush-right" cx="242" cy="160" rx="8" ry="5" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Smile -->
  <path d="M190 168 Q200 178 210 168" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
</svg>