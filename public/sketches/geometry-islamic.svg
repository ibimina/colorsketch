<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Islamic Geometric Pattern - Adult Coloring -->
  
  <!-- Background -->
  <rect id="background" x="0" y="0" width="400" height="400" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Outer decorative border -->
  <rect id="border-outer" x="10" y="10" width="380" height="380" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect id="border-inner" x="20" y="20" width="360" height="360" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Central 8-pointed star -->
  <polygon id="star-8-outer" points="200,40 230,130 320,130 250,182 275,270 200,220 125,270 150,182 80,130 170,130" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <polygon id="star-8-inner" points="200,80 218,135 275,135 228,168 245,225 200,192 155,225 172,168 125,135 182,135" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Interlocking pattern elements -->
  <g id="pattern-top">
    <path id="interlock-1" d="M200 30 L250 50 L270 90 L250 130 L200 150 L150 130 L130 90 L150 50 Z" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="interlock-inner-1" d="M200 50 L235 65 L250 95 L235 125 L200 140 L165 125 L150 95 L165 65 Z" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <g id="pattern-right">
    <path id="interlock-2" d="M270 90 L310 80 L350 100 L370 150 L350 200 L310 220 L270 200 L250 150 Z" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="interlock-inner-2" d="M285 110 L315 102 L340 118 L355 155 L340 192 L315 208 L285 190 L270 155 Z" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <g id="pattern-bottom-right">
    <path id="interlock-3" d="M310 220 L350 200 L370 250 L350 300 L310 320 L270 310 L250 260 L270 220 Z" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  
  <g id="pattern-bottom">
    <path id="interlock-4" d="M200 250 L250 270 L270 310 L250 350 L200 370 L150 350 L130 310 L150 270 Z" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="interlock-inner-4" d="M200 270 L235 285 L250 315 L235 345 L200 360 L165 345 L150 315 L165 285 Z" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <g id="pattern-bottom-left">
    <path id="interlock-5" d="M90 220 L130 200 L150 250 L130 300 L90 320 L50 300 L30 250 L50 200 Z" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  
  <g id="pattern-left">
    <path id="interlock-6" d="M130 90 L90 80 L50 100 L30 150 L50 200 L90 220 L130 200 L150 150 Z" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="interlock-inner-6" d="M115 110 L85 102 L60 118 L45 155 L60 192 L85 208 L115 190 L130 155 Z" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <!-- Corner decorations -->
  <g id="corner-tl">
    <polygon id="corner-star-1" points="50,50 70,45 80,60 70,75 50,70 40,60" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  <g id="corner-tr">
    <polygon id="corner-star-2" points="350,50 370,45 380,60 370,75 350,70 340,60" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  <g id="corner-bl">
    <polygon id="corner-star-3" points="50,350 70,345 80,360 70,375 50,370 40,360" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  <g id="corner-br">
    <polygon id="corner-star-4" points="350,350 370,345 380,360 370,375 350,370 340,360" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  
  <!-- Center decoration -->
  <circle id="center-outer" cx="200" cy="200" r="45" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <circle id="center-mid" cx="200" cy="200" r="35" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <polygon id="center-star" points="200,160 210,185 235,185 215,202 222,227 200,212 178,227 185,202 165,185 190,185" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle id="center-inner" cx="200" cy="200" r="15" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
</svg>