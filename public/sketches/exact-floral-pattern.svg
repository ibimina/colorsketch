<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Exact Zentangle Floral Array Approximation -->
  <defs>
    <!-- Basic patterns to reduce SVG size -->
    <pattern id="dots2" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#1a1a1a"/>
    </pattern>
    <pattern id="checker" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="8" height="8" fill="#1a1a1a"/>
      <rect x="8" y="8" width="8" height="8" fill="#1a1a1a"/>
    </pattern>
  </defs>

  <rect width="400" height="400" fill="white"/>

  <!-- Top Right Big Sunflower/Mandala -->
  <g transform="translate(250, 150)">
    <!-- Scalloped edges -->
    <circle cx="0" cy="0" r="100" fill="url(#dots2)" opacity="0.3"/>
    <path d="M 0,-100 A 20,20 0 0,1 30,-95 A 20,20 0 0,1 58,-80 A 20,20 0 0,1 80,-58 A 20,20 0 0,1 95,-30 A 20,20 0 0,1 100,0 A 20,20 0 0,1 95,30 A 20,20 0 0,1 80,58 A 20,20 0 0,1 58,80 A 20,20 0 0,1 30,95 A 20,20 0 0,1 0,100 A 20,20 0 0,1 -30,95 A 20,20 0 0,1 -58,80 A 20,20 0 0,1 -80,58 A 20,20 0 0,1 -95,30 A 20,20 0 0,1 -100,0 A 20,20 0 0,1 -95,-30 A 20,20 0 0,1 -80,-58 A 20,20 0 0,1 -58,-80 A 20,20 0 0,1 -30,-95 A 20,20 0 0,1 0,-100 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Long petals -->
    <g fill="none" stroke="#1a1a1a" stroke-width="1.5">
      <!-- Generated petals via simple rotation mapping -->
      <path d="M 0,0 C 20,-40 -20,-80 0,-90 C 20,-80 -20,-40 0,0 Z" />
      <path d="M 0,0 C 20,-40 -20,-80 0,-90 C 20,-80 -20,-40 0,0 Z" transform="rotate(30)"/>
      <path d="M 0,0 C 20,-40 -20,-80 0,-90 C 20,-80 -20,-40 0,0 Z" transform="rotate(60)"/>
      <path d="M 0,0 C 20,-40 -20,-80 0,-90 C 20,-80 -20,-40 0,0 Z" transform="rotate(90)"/>
      <path d="M 0,0 C 20,-40 -20,-80 0,-90 C 20,-80 -20,-40 0,0 Z" transform="rotate(120)"/>
      <path d="M 0,0 C 20,-40 -20,-80 0,-90 C 20,-80 -20,-40 0,0 Z" transform="rotate(150)"/>
      <path d="M 0,0 C 20,-40 -20,-80 0,-90 C 20,-80 -20,-40 0,0 Z" transform="rotate(180)"/>
      <path d="M 0,0 C 20,-40 -20,-80 0,-90 C 20,-80 -20,-40 0,0 Z" transform="rotate(210)"/>
      <path d="M 0,0 C 20,-40 -20,-80 0,-90 C 20,-80 -20,-40 0,0 Z" transform="rotate(240)"/>
      <path d="M 0,0 C 20,-40 -20,-80 0,-90 C 20,-80 -20,-40 0,0 Z" transform="rotate(270)"/>
      <path d="M 0,0 C 20,-40 -20,-80 0,-90 C 20,-80 -20,-40 0,0 Z" transform="rotate(300)"/>
      <path d="M 0,0 C 20,-40 -20,-80 0,-90 C 20,-80 -20,-40 0,0 Z" transform="rotate(330)"/>
    </g>
    <!-- Inner circles -->
    <circle cx="0" cy="0" r="40" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="0" r="30" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Seed pattern -->
    <path d="M 0,-25 L 0,25 M -25,0 L 25,0 M -18,-18 L 18,18 M -18,18 L 18,-18" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="10" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  </g>

  <!-- Left Side elements -->
  <g transform="translate(50, 100)">
    <!-- Small flower -->
    <circle cx="0" cy="0" r="30" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M 0,-15 L 0,15 M -15,0 L 15,0 M -10,-10 L 10,10 M -10,10 L 10,-10" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="0" r="5" fill="#1a1a1a"/>
  </g>

  <g transform="translate(100, 200)">
    <path d="M 0,0 Q -50,50 -20,100 Q 20,130 50,80 Q 80,40 10,0" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 0,10 Q -40,55 -15,90 Q 15,115 40,75 Q 65,40 15,10" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  </g>

  <!-- Bottom Flower -->
  <g transform="translate(200, 320)">
    <circle cx="0" cy="0" r="50" fill="url(#checker)" opacity="0.1"/>
    <circle cx="0" cy="0" r="50" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#1a1a1a"/>
    <path d="M 0,-20 L 0,-50 M 0,20 L 0,50 M -20,0 L -50,0 M 20,0 L 50,0 M -14,-14 L -35,-35 M 14,14 L 35,35 M -14,14 L -35,35 M 14,-14 L 35,-35" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Scallop band -->
    <path d="M 0,-50 A 10,10 0 0,1 15,-48 A 10,10 0 0,1 28,-40 A 10,10 0 0,1 40,-28 A 10,10 0 0,1 48,-15 A 10,10 0 0,1 50,0 A 10,10 0 0,1 48,15 A 10,10 0 0,1 40,28 A 10,10 0 0,1 28,40 A 10,10 0 0,1 15,48 A 10,10 0 0,1 0,50 A 10,10 0 0,1 -15,48 A 10,10 0 0,1 -28,40 A 10,10 0 0,1 -40,28 A 10,10 0 0,1 -48,15 A 10,10 0 0,1 -50,0 Z" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>

  <!-- Butterfly Top Left -->
  <g transform="translate(130, 80) rotate(-30) scale(0.6)">
    <path d="M 0,0 C -50,-80 -100,-40 -80,0 C -50,20 -20,20 0,0 Z" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M 0,0 C 50,-80 100,-40 80,0 C 50,20 20,20 0,0 Z" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M 0,0 C -40,50 -80,30 -60,-10 Z" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M 0,0 C 40,50 80,30 60,-10 Z" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="8" ry="30" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Wing patterns -->
    <path d="M -20,-10 C -40,-40 -60,-20 -50,-5 Z" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 20,-10 C 40,-40 60,-20 50,-5 Z" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  </g>

  <!-- Flowing Paisley / Background squiggles -->
  <path d="M 0 100 Q 150 150 150 250 Q 150 350 50 350" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <path d="M 10 110 Q 140 160 140 250 Q 140 340 50 340" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M 20 120 Q 130 170 130 250 Q 130 330 50 330" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <path d="M 200 0 Q 200 150 350 250" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <path d="M 210 0 Q 210 140 350 240" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M 220 0 Q 220 130 350 230" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

</svg>