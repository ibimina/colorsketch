  <!-- Fishing line -->
  <path id="fishing-line" d="M330 100 L340 340" fill="none" stroke-dasharray="3,3"/>
  
  <!-- Bobber/Float -->
  <ellipse id="bobber" cx="340" cy="340" rx="8" ry="12" fill="white"/>
  <path id="bobber-line" d="M340 328 L340 340" fill="none"/>
  
  <!-- Head -->
  <ellipse id="head" cx="190" cy="115" rx="38" ry="42" fill="white"/>
  
  <!-- Hair - messy/casual -->
  <path id="hair" d="M152 110 Q148 70 190 60 Q232 70 228 110" fill="white"/>
  <path id="hair-spikes" d="M160 75 Q165 60 175 72 Q182 58 192 70 Q200 55 210 68 Q218 58 225 75" fill="white"/>
  <path id="hair-detail" d="M158 90 Q170 85 180 90 Q190 82 200 88 Q210 82 220 90" fill="none"/>
  
  <!-- Cap -->
  <path id="cap-brim" d="M150 100 Q130 95 120 105 Q125 115 150 110" fill="white"/>
  <path id="cap-top" d="M152 100 Q155 85 190 82 Q220 85 225 100" fill="white"/>
  
  <!-- Face -->
  <!-- Eyes - focused/watching bobber -->
  <ellipse id="eye-left" cx="175" cy="112" rx="8" ry="10" fill="white"/>
  <ellipse id="eye-right" cx="205" cy="112" rx="8" ry="10" fill="white"/>
  <circle id="pupil-left" cx="178" cy="114" r="5" fill="white"/>
  <circle id="pupil-right" cx="208" cy="114" r="5" fill="white"/>
  <circle id="sparkle-left" cx="174" cy="109" r="2" fill="white"/>
  <circle id="sparkle-right" cx="204" cy="109" r="2" fill="white"/>
  
  <!-- Eyebrows - concentrated -->
  <path id="eyebrow-left" d="M165 100 Q175 97 185 102" fill="none"/>
  <path id="eyebrow-right" d="M195 102 Q205 97 215 100" fill="none"/>
  
  <!-- Nose -->
  <path id="nose" d="M190 118 Q193 125 190 132" fill="none"/>
  
  <!-- Mouth - patient smile -->
  <path id="mouth" d="M182 142 Q190 148 198 142" fill="none"/>
  
  <!-- Tackle box next to him -->
  <rect id="tacklebox" x="70" y="260" width="45" height="30" rx="3" fill="white"/>
  <path id="tacklebox-handle" d="M80 260 Q92 250 105 260" stroke-width="2" fill="none"/>
  <path id="tacklebox-latch" d="M88 275 L97 275" stroke-width="3"/>
  
  <!-- Fish jumping (splash) -->
  <path id="fish-body" d="M280 290 Q295 280 310 290 Q305 300 290 300 Q285 300 280 295" fill="white"/>
  <path id="fish-tail" d="M280 290 L265 280 L265 300 Z" fill="white"/>
  <ellipse id="fish-eye" cx="302" cy="290" rx="3" ry="3" fill="white"/>
  
  <!-- Splash drops -->
  <path id="splash-1" d="M275 285 Q278 275 281 285" fill="white"/>
  <path id="splash-2" d="M315 288 Q318 278 321 288" fill="white"/>
  <circle id="splash-drop-1" cx="270" cy="295" r="3" fill="white"/>
  <circle id="splash-drop-2" cx="322" cy="300" r="2" fill="white"/>
  
  <!-- Birds in sky -->
  <path id="bird-1" d="M250 80 Q255 75 260 80 Q265 75 270 80" fill="none"/>
  <path id="bird-2" d="M280 60 Q283 57 286 60 Q289 57 292 60" fill="none"/>
</svg>