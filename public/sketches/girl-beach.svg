  <path id="beach" d="M0 200 L400 200 L400 400 L0 400 Z" fill="white"/>
  
  <!-- Sandcastle -->
  <!-- Main tower -->
  <rect id="tower-main" x="240" y="280" width="60" height="80" fill="white"/>
  <path id="tower-main-top" d="M235 280 L245 260 L255 280 L265 255 L275 280 L285 260 L295 280 L305 265 L310 280" fill="white"/>
  
  <!-- Side towers -->
  <rect id="tower-left" x="200" y="310" width="40" height="50" fill="white"/>
  <path id="tower-left-top" d="M195 310 L205 295 L215 310 L225 292 L235 310 L245 298 L250 310" fill="white"/>
  
  <rect id="tower-right" x="300" y="310" width="40" height="50" fill="white"/>
  <path id="tower-right-top" d="M295 310 L305 295 L315 310 L325 292 L335 310 L345 300 L350 310" fill="white"/>
  
  <!-- Castle base/wall -->
  <rect id="castle-wall" x="195" y="360" width="150" height="25" fill="white"/>
  <path id="wall-pattern" d="M200 365 L200 380 M220 365 L220 380 M240 365 L240 380 M260 365 L260 380 M280 365 L280 380 M300 365 L300 380 M320 365 L320 380 M340 365 L340 380" fill="none"/>
  
  <!-- Castle details -->
  <rect id="door" x="258" y="330" width="24" height="35" rx="12" fill="white"/>
  <path id="window-1" d="M250 295 L250 305 L260 305 L260 295" fill="white"/>
  <path id="window-2" d="M280 295 L280 305 L290 305 L290 295" fill="white"/>
  
  <!-- Flag -->
  <path id="flag-pole" d="M270 255 L270 225" stroke-width="2"/>
  <path id="flag" d="M270 225 L295 235 L270 245" fill="white"/>
  
  <!-- Seashells decorating castle -->
  <ellipse id="shell-1" cx="250" cy="358" rx="6" ry="4" fill="white"/>
  <path id="shell-1-lines" d="M246 358 L250 355 L254 358" fill="none"/>
  <ellipse id="shell-2" cx="290" cy="358" rx="5" ry="3" fill="white"/>
  
  <!-- Girl sitting -->
  <!-- Legs -->
  <path id="leg-left" d="M100 330 Q90 350 95 380" fill="white"/>
  <path id="leg-right" d="M140 330 Q150 350 145 380" fill="white"/>
  
  <!-- Feet -->
  <ellipse id="foot-left" cx="98" cy="382" rx="15" ry="6" fill="white"/>
  <ellipse id="foot-right" cx="148" cy="382" rx="15" ry="6" fill="white"/>
  
  <!-- Swimsuit/dress -->
  <path id="swimsuit" d="M90 280 Q85 310 95 340 L145 340 Q155 310 150 280" fill="white"/>
  <path id="swimsuit-pattern" d="M100 300 Q120 295 140 300" fill="none" stroke-dasharray="4,4"/>
  
  <!-- Body -->
  <path id="torso" d="M100 220 L95 285 Q120 295 145 285 L140 220" fill="white"/>
  
  <!-- Straps -->
  <path id="strap-left" d="M100 220 L108 280" stroke-width="3"/>
  <path id="strap-right" d="M140 220 L132 280" stroke-width="3"/>
  
