  <path id="sun-ray-1" d="M350 10 L350 0" stroke-width="3"/>
  <path id="sun-ray-2" d="M385 25 L395 15" stroke-width="3"/>
  <path id="sun-ray-3" d="M390 50 L400 50" stroke-width="3"/>
  <path id="sun-ray-4" d="M385 75 L395 85" stroke-width="3"/>
  <path id="sun-ray-5" d="M350 90 L350 100" stroke-width="3"/>
  
  <!-- Cloud -->
  <ellipse id="cloud-1" cx="80" cy="50" rx="30" ry="18" fill="white"/>
  <ellipse id="cloud-2" cx="55" cy="55" rx="22" ry="14" fill="white"/>
  <ellipse id="cloud-3" cx="105" cy="55" rx="20" ry="12" fill="white"/>
  
  <!-- Ocean/Water -->
  <path id="ocean" d="M0 180 Q50 175 100 180 Q150 185 200 180 Q250 175 300 180 Q350 185 400 180 L400 200 L0 200 Z" fill="white"/>
  <path id="wave-1" d="M0 185 Q25 180 50 185 Q75 190 100 185" fill="none"/>
  <path id="wave-2" d="M150 182 Q175 177 200 182 Q225 187 250 182" fill="none"/>
  <path id="wave-3" d="M300 185 Q325 180 350 185 Q375 190 400 185" fill="none"/>
  
