  <path id="bucket" d="M45 300 L40 340 L85 340 L80 300" fill="white"/>
  <ellipse id="bucket-top" cx="62" cy="300" rx="20" ry="8" fill="white"/>
  <path id="bucket-handle" d="M45 295 Q62 280 80 295" stroke-width="3" fill="none"/>
  
  <!-- Shovel near her -->
  <rect id="shovel-handle" x="170" y="350" width="8" height="35" rx="2" fill="white"/>
  <path id="shovel-head" d="M165 348 L183 348 L180 335 Q174 330 168 335 Z" fill="white"/>
  
  <!-- Head -->
  <ellipse id="head" cx="120" cy="175" rx="40" ry="45" fill="white"/>
  
  <!-- Hair with ponytail -->
  <path id="hair-top" d="M80 175 Q75 130 120 115 Q165 130 160 175" fill="white"/>
  <path id="hair-bangs" d="M85 150 Q95 140 105 150 Q115 138 125 148 Q135 138 145 150 Q155 142 158 155" fill="white"/>
  <path id="ponytail" d="M155 145 Q175 140 185 160 Q195 180 185 210 Q180 230 175 245" fill="white"/>
  <path id="ponytail-band" d="M155 145 Q165 142 165 150" fill="none" stroke-width="4"/>
  
  <!-- Hair blowing -->
  <path id="hair-strand" d="M180 170 Q190 165 195 175" fill="none"/>
  <path id="hair-strand-2" d="M182 190 Q195 188 200 195" fill="none"/>
  
  <!-- Face -->
  <!-- Eyes - happy -->
  <path id="eye-left" d="M105 170 Q112 162 120 170" fill="none" stroke-width="2.5"/>
  <path id="eye-right" d="M125 170 Q132 162 140 170" fill="none" stroke-width="2.5"/>
  
  <!-- Nose -->
  <path id="nose" d="M120 178 Q122 183 120 188" fill="none"/>
  
  <!-- Big happy smile -->
  <path id="mouth" d="M108 198 Q120 210 132 198" fill="white"/>
  <path id="mouth-line" d="M108 198 Q120 210 132 198" fill="none"/>
  
  <!-- Blush -->
  <ellipse id="blush-left" cx="98" cy="185" rx="8" ry="4" fill="white" stroke-dasharray="2,2"/>
  <ellipse id="blush-right" cx="142" cy="185" rx="8" ry="4" fill="white" stroke-dasharray="2,2"/>
  
  <!-- Scattered seashells on beach -->
  <ellipse id="beach-shell-1" cx="50" cy="360" rx="8" ry="5" fill="white"/>
  <path id="beach-shell-1-line" d="M45 360 L50 356 L55 360" fill="none"/>
  <ellipse id="beach-shell-2" cx="350" cy="350" rx="6" ry="4" fill="white"/>
  <ellipse id="beach-shell-3" cx="30" cy="385" rx="5" ry="3" fill="white"/>
  
  <!-- Starfish -->
  <path id="starfish" d="M370 370 L375 355 L380 370 L395 365 L385 375 L395 385 L380 380 L375 395 L370 380 L355 385 L365 375 L355 365 Z" fill="white"/>
  
  <!-- Bird in sky -->
  <path id="bird" d="M200 80 Q205 75 210 80 Q215 75 220 80" fill="none"/>
</svg>