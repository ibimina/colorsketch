<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Crystal Grid Sacred Geometry - Adult Coloring -->
  
  <!-- Outer circle -->
  <circle cx="200" cy="200" r="190" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Center crystal -->
  <g id="center-crystal">
    <path d="M 200 140 L 230 170 L 220 210 L 200 220 L 180 210 L 170 170 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="200" y1="140" x2="200" y2="220" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="170" y1="170" x2="230" y2="170" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="180" y1="210" x2="220" y2="210" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="200" y1="140" x2="230" y2="210" stroke="#1a1a1a" stroke-width="0.7"/>
    <line x1="200" y1="140" x2="180" y2="210" stroke="#1a1a1a" stroke-width="0.7"/>
    <line x1="230" y1="170" x2="180" y2="210" stroke="#1a1a1a" stroke-width="0.7"/>
    <line x1="170" y1="170" x2="220" y2="210" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <!-- Inner shine -->
    <path d="M 200 160 L 210 180 L 205 200 L 200 205 L 195 200 L 190 180 Z" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  
  <!-- Six surrounding crystals -->
  <g id="crystal-ring">
    <!-- Top crystal -->
    <g transform="translate(200, 60)">
      <path d="M 0 0 L 20 20 L 15 45 L 0 50 L -15 45 L -20 20 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="50" stroke="#1a1a1a" stroke-width="0.7"/>
      <line x1="-20" y1="20" x2="20" y2="20" stroke="#1a1a1a" stroke-width="0.7"/>
      <line x1="-15" y1="45" x2="15" y2="45" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 0 10 L 10 25 L 7 38 L 0 42 L -7 38 L -10 25 Z" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    </g>
    
    <!-- Top-right crystal -->
    <g transform="translate(290, 110) rotate(60)">
      <path d="M 0 0 L 20 20 L 15 45 L 0 50 L -15 45 L -20 20 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="50" stroke="#1a1a1a" stroke-width="0.7"/>
      <line x1="-20" y1="20" x2="20" y2="20" stroke="#1a1a1a" stroke-width="0.7"/>
      <line x1="-15" y1="45" x2="15" y2="45" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 0 10 L 10 25 L 7 38 L 0 42 L -7 38 L -10 25 Z" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    </g>
    
    <!-- Bottom-right crystal -->
    <g transform="translate(290, 290) rotate(120)">
      <path d="M 0 0 L 20 20 L 15 45 L 0 50 L -15 45 L -20 20 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="50" stroke="#1a1a1a" stroke-width="0.7"/>
      <line x1="-20" y1="20" x2="20" y2="20" stroke="#1a1a1a" stroke-width="0.7"/>
      <line x1="-15" y1="45" x2="15" y2="45" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 0 10 L 10 25 L 7 38 L 0 42 L -7 38 L -10 25 Z" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    </g>
    
    <!-- Bottom crystal -->
    <g transform="translate(200, 340) rotate(180)">
      <path d="M 0 0 L 20 20 L 15 45 L 0 50 L -15 45 L -20 20 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="50" stroke="#1a1a1a" stroke-width="0.7"/>
      <line x1="-20" y1="20" x2="20" y2="20" stroke="#1a1a1a" stroke-width="0.7"/>
      <line x1="-15" y1="45" x2="15" y2="45" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 0 10 L 10 25 L 7 38 L 0 42 L -7 38 L -10 25 Z" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    </g>
    
    <!-- Bottom-left crystal -->
    <g transform="translate(110, 290) rotate(240)">
      <path d="M 0 0 L 20 20 L 15 45 L 0 50 L -15 45 L -20 20 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="50" stroke="#1a1a1a" stroke-width="0.7"/>
      <line x1="-20" y1="20" x2="20" y2="20" stroke="#1a1a1a" stroke-width="0.7"/>
      <line x1="-15" y1="45" x2="15" y2="45" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 0 10 L 10 25 L 7 38 L 0 42 L -7 38 L -10 25 Z" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    </g>
    
    <!-- Top-left crystal -->
    <g transform="translate(110, 110) rotate(300)">
      <path d="M 0 0 L 20 20 L 15 45 L 0 50 L -15 45 L -20 20 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="50" stroke="#1a1a1a" stroke-width="0.7"/>
      <line x1="-20" y1="20" x2="20" y2="20" stroke="#1a1a1a" stroke-width="0.7"/>
      <line x1="-15" y1="45" x2="15" y2="45" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 0 10 L 10 25 L 7 38 L 0 42 L -7 38 L -10 25 Z" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    </g>
  </g>
  
  <!-- Connecting lines (energy grid) -->
  <g id="grid-lines">
    <line x1="200" y1="180" x2="200" y2="60" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="220" y1="190" x2="290" y2="110" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="220" y1="210" x2="290" y2="290" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="200" y1="220" x2="200" y2="340" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="180" y1="210" x2="110" y2="290" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="180" y1="190" x2="110" y2="110" stroke="#1a1a1a" stroke-width="1"/>
    
    <!-- Hexagon through crystal points -->
    <path d="M 200 60 L 290 110 L 290 290 L 200 340 L 110 290 L 110 110 Z" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    
    <!-- Inner connecting hexagon -->
    <path d="M 200 140 L 230 170 L 220 210 L 200 220 L 180 210 L 170 170 Z" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  
  <!-- Small decorative crystals in corners -->
  <g id="corner-crystals">
    <g transform="translate(60, 60)">
      <path d="M 0 0 L 10 10 L 7 20 L 0 23 L -7 20 L -10 10 Z" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="23" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
    <g transform="translate(340, 60)">
      <path d="M 0 0 L 10 10 L 7 20 L 0 23 L -7 20 L -10 10 Z" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="23" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
    <g transform="translate(340, 340)">
      <path d="M 0 0 L 10 10 L 7 20 L 0 23 L -7 20 L -10 10 Z" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="23" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
    <g transform="translate(60, 340)">
      <path d="M 0 0 L 10 10 L 7 20 L 0 23 L -7 20 L -10 10 Z" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="23" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
  </g>
  
  <!-- Circular energy waves -->
  <circle cx="200" cy="200" r="100" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Center point (energy source) -->
  <circle cx="200" cy="200" r="5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="10" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="200" cy="200" r="15" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
  <circle cx="200" cy="200" r="20" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Radiating energy lines -->
  <g id="energy-rays">
    <line x1="200" y1="180" x2="200" y2="30" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="220" y1="200" x2="370" y2="200" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="200" y1="220" x2="200" y2="370" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="180" y1="200" x2="30" y2="200" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="214" y1="186" x2="332" y2="68" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="214" y1="214" x2="332" y2="332" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="186" y1="214" x2="68" y2="332" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="186" y1="186" x2="68" y2="68" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
</svg>