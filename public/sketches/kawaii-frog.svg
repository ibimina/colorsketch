<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cute Kawaii Frog on Lily Pad -->
  
  <!-- Water background ripples -->
  <ellipse id="water-ripple-1" cx="200" cy="350" rx="180" ry="40" fill="none" stroke-dasharray="8,8"/>
  <ellipse id="water-ripple-2" cx="200" cy="360" rx="150" ry="30" fill="none" stroke-dasharray="6,6"/>
  
  <!-- Lily pad -->
  <ellipse id="lilypad" cx="200" cy="330" rx="120" ry="50" fill="white"/>
  <path id="lilypad-cut" d="M200 280 L200 330" fill="none" stroke-width="3"/>
  <path id="lilypad-vein-1" d="M200 330 L120 310" fill="none"/>
  <path id="lilypad-vein-2" d="M200 330 L150 350" fill="none"/>
  <path id="lilypad-vein-3" d="M200 330 L280 310" fill="none"/>
  <path id="lilypad-vein-4" d="M200 330 L250 350" fill="none"/>
  
  <!-- Small lily pads -->
  <ellipse id="lilypad-small-1" cx="60" cy="370" rx="40" ry="18" fill="white"/>
  <path id="lilypad-small-1-cut" d="M60 352 L60 370" fill="none"/>
  <ellipse id="lilypad-small-2" cx="350" cy="365" rx="35" ry="15" fill="white"/>
  <path id="lilypad-small-2-cut" d="M350 350 L350 365" fill="none"/>
  
  <!-- Water lily flower -->
  <ellipse id="flower-petal-1" cx="70" cy="355" rx="8" ry="15" fill="white"/>
  <ellipse id="flower-petal-2" cx="82" cy="360" rx="8" ry="15" fill="white" transform="rotate(30 82 360)"/>
  <ellipse id="flower-petal-3" cx="58" cy="360" rx="8" ry="15" fill="white" transform="rotate(-30 58 360)"/>
  <circle id="flower-center" cx="70" cy="362" r="6" fill="white"/>
  
  <!-- Frog body -->
  <ellipse id="body" cx="200" cy="280" rx="70" ry="50" fill="white"/>
  
  <!-- Belly marking -->
  <ellipse id="belly" cx="200" cy="290" rx="45" ry="35" fill="white" stroke-dasharray="3,3"/>
  
  <!-- Back legs -->
  <path id="back-leg-left" d="M130 290 Q100 310 90 340 Q85 355 100 360 L130 355 L140 340 Q130 320 140 300" fill="white"/>
  <path id="back-leg-right" d="M270 290 Q300 310 310 340 Q315 355 300 360 L270 355 L260 340 Q270 320 260 300" fill="white"/>
  
  <!-- Back feet webbing -->
  <path id="foot-left" d="M90 360 L75 375 L95 365 L90 380 L110 365 L115 378 L130 355" fill="white"/>
  <path id="foot-right" d="M310 360 L325 375 L305 365 L310 380 L290 365 L285 378 L270 355" fill="white"/>
  
  <!-- Leg segments -->
  <path id="leg-segment-left" d="M115 315 Q105 320 110 330" fill="none"/>
  <path id="leg-segment-right" d="M285 315 Q295 320 290 330" fill="none"/>
  
  <!-- Front legs -->
  <path id="front-leg-left" d="M145 280 Q125 295 120 310" fill="white"/>
  <path id="front-leg-right" d="M255 280 Q275 295 280 310" fill="white"/>
  
  <!-- Front feet -->
  <path id="front-foot-left" d="M120 310 L105 320 L118 315 L110 328 L125 318 L128 330 L135 315" fill="white"/>
  <path id="front-foot-right" d="M280 310 L295 320 L282 315 L290 328 L275 318 L272 330 L265 315" fill="white"/>
  
  <!-- Head -->
  <ellipse id="head" cx="200" cy="180" rx="75" ry="65" fill="white"/>
  
  <!-- Eye bumps -->
  <ellipse id="eye-bump-left" cx="150" cy="130" rx="35" ry="35" fill="white"/>
  <ellipse id="eye-bump-right" cx="250" cy="130" rx="35" ry="35" fill="white"/>
  
  <!-- Eyes -->
  <ellipse id="eye-left" cx="150" cy="130" rx="25" ry="28" fill="white"/>
  <ellipse id="eye-right" cx="250" cy="130" rx="25" ry="28" fill="white"/>
  <circle id="pupil-left" cx="155" cy="135" r="15" fill="white"/>
  <circle id="pupil-right" cx="255" cy="135" r="15" fill="white"/>
  <circle id="sparkle-left-1" cx="145" cy="122" r="6" fill="white"/>
  <circle id="sparkle-left-2" cx="162" cy="142" r="3" fill="white"/>
  <circle id="sparkle-right-1" cx="245" cy="122" r="6" fill="white"/>
  <circle id="sparkle-right-2" cx="262" cy="142" r="3" fill="white"/>
  
  <!-- Nostrils -->
  <circle id="nostril-left" cx="185" cy="180" r="4" fill="white"/>
  <circle id="nostril-right" cx="215" cy="180" r="4" fill="white"/>
  
  <!-- Big smile -->
  <path id="mouth" d="M145 200 Q200 250 255 200" fill="white"/>
  <path id="mouth-line" d="M145 200 Q200 250 255 200" fill="none" stroke-width="2.5"/>
  
  <!-- Tongue (optional cute element) -->
  <path id="tongue" d="M180 215 Q200 240 220 215" fill="white"/>
  
  <!-- Blush -->
  <ellipse id="blush-left" cx="125" cy="175" rx="15" ry="8" fill="white" stroke-dasharray="2,2"/>
  <ellipse id="blush-right" cx="275" cy="175" rx="15" ry="8" fill="white" stroke-dasharray="2,2"/>
  
  <!-- Crown (optional princess frog) -->
  <path id="crown-base" d="M160 95 L240 95 L240 75 L160 75 Z" fill="white"/>
  <path id="crown-points" d="M160 75 L170 55 L185 75 L200 50 L215 75 L230 55 L240 75" fill="white"/>
  <circle id="crown-gem-1" cx="170" cy="68" r="4" fill="white"/>
  <circle id="crown-gem-2" cx="200" cy="60" r="5" fill="white"/>
  <circle id="crown-gem-3" cx="230" cy="68" r="4" fill="white"/>
  
  <!-- Dragonfly -->
  <ellipse id="dragonfly-body" cx="320" cy="150" rx="5" ry="20" fill="white"/>
  <ellipse id="dragonfly-wing-1" cx="310" cy="145" rx="15" ry="6" fill="white" transform="rotate(-20 310 145)"/>
  <ellipse id="dragonfly-wing-2" cx="330" cy="145" rx="15" ry="6" fill="white" transform="rotate(20 330 145)"/>
  <ellipse id="dragonfly-wing-3" cx="312" cy="155" rx="12" ry="5" fill="white" transform="rotate(-15 312 155)"/>
  <ellipse id="dragonfly-wing-4" cx="328" cy="155" rx="12" ry="5" fill="white" transform="rotate(15 328 155)"/>
  <circle id="dragonfly-head" cx="320" cy="130" r="6" fill="white"/>
  
  <!-- Bubbles -->
  <circle id="bubble-1" cx="80" cy="280" r="8" fill="white"/>
  <circle id="bubble-2" cx="70" cy="260" r="5" fill="white"/>
  <circle id="bubble-3" cx="330" cy="270" r="6" fill="white"/>
</svg>