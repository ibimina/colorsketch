<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Underwater Ocean Scene - Seasonal Themed - Adult Coloring -->
  
  <!-- Water background -->
  <rect x="0" y="0" width="500" height="400" fill="white" stroke="none"/>
  
  <!-- Water depth layers -->
  <path d="M 0 50 Q 100 45 200 50 Q 300 55 400 50 Q 450 48 500 50" fill="none" stroke="#1a1a1a" stroke-width="0.7" opacity="0.5"/>
  <path d="M 0 100 Q 100 95 200 100 Q 300 105 400 100 Q 450 98 500 100" fill="none" stroke="#1a1a1a" stroke-width="0.7" opacity="0.5"/>
  <path d="M 0 150 Q 100 145 200 150 Q 300 155 400 150 Q 450 148 500 150" fill="none" stroke="#1a1a1a" stroke-width="0.7" opacity="0.5"/>
  
  <!-- Coral reef bottom -->
  <g id="coral-reef">
    <!-- Large brain coral -->
    <g transform="translate(100, 330)">
      <ellipse cx="0" cy="0" rx="40" ry="30" fill="white" stroke="#1a1a1a" stroke-width="2"/>
      <path d="M -30 -10 Q -20 -15 -10 -10 Q 0 -15 10 -10 Q 20 -15 30 -10" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M -30 0 Q -20 -5 -10 0 Q 0 -5 10 0 Q 20 -5 30 0" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M -30 10 Q -20 5 -10 10 Q 0 5 10 10 Q 20 5 30 10" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M -25 -20 Q -15 -23 -5 -20" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M 5 -20 Q 15 -23 25 -20" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M -25 18 Q -15 21 -5 18" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M 5 18 Q 15 21 25 18" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </g>
    
    <!-- Fan coral -->
    <g transform="translate(250, 350)">
      <path d="M 0 0 Q -30 -30 -40 -60 M 0 0 Q -20 -35 -25 -65 M 0 0 Q -10 -38 -10 -70 M 0 0 Q 0 -40 5 -72 M 0 0 Q 10 -38 15 -68 M 0 0 Q 20 -35 30 -62 M 0 0 Q 30 -30 42 -55" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M -40 -60 Q -30 -62 -25 -65 Q -18 -68 -10 -70 Q -2 -72 5 -72 Q 12 -70 15 -68 Q 23 -65 30 -62 Q 37 -58 42 -55" fill="white" stroke="#1a1a1a" stroke-width="2"/>
      <path d="M -35 -48 Q -18 -50 0 -48 Q 18 -50 35 -48" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M -30 -36 Q -15 -38 0 -36 Q 15 -38 30 -36" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M -25 -24 Q -12 -26 0 -24 Q 12 -26 25 -24" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    </g>
    
    <!-- Tube coral -->
    <g transform="translate(380, 350)">
      <ellipse cx="-15" cy="0" rx="6" ry="30" fill="white" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="-15" cy="-28" rx="6" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M -18 -10 L -12 -10 M -18 0 L -12 0 M -18 10 L -12 10" stroke="#1a1a1a" stroke-width="0.7"/>
      
      <ellipse cx="0" cy="-5" rx="6" ry="35" fill="white" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="0" cy="-38" rx="6" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M -3 -15 L 3 -15 M -3 -5 L 3 -5 M -3 5 L 3 5 M -3 15 L 3 15" stroke="#1a1a1a" stroke-width="0.7"/>
      
      <ellipse cx="15" cy="0" rx="6" ry="30" fill="white" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="15" cy="-28" rx="6" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 12 -10 L 18 -10 M 12 0 L 18 0 M 12 10 L 18 10" stroke="#1a1a1a" stroke-width="0.7"/>
    </g>
    
    <!-- Sea anemone -->
    <g transform="translate(450, 350)">
      <ellipse cx="0" cy="0" rx="20" ry="10" fill="white" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="-15" y1="0" x2="-18" y2="-25" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="-10" y1="-2" x2="-10" y2="-28" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="-5" y1="-3" x2="-4" y2="-30" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="0" y1="-3" x2="2" y2="-32" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="5" y1="-3" x2="8" y2="-30" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="10" y1="-2" x2="14" y2="-28" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="15" y1="0" x2="20" y2="-25" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="-18" cy="-25" r="2" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <circle cx="-10" cy="-28" r="2" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <circle cx="-4" cy="-30" r="2" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <circle cx="2" cy="-32" r="2" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <circle cx="8" cy="-30" r="2" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <circle cx="14" cy="-28" r="2" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <circle cx="20" cy="-25" r="2" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Tropical fish 1 - Angelfish -->
  <g id="angelfish" transform="translate(150, 150)">
    <path d="M 0 0 Q -20 -30 -15 -50 L 0 -25 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 0 0 Q -20 30 -15 50 L 0 25 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <ellipse cx="10" cy="0" rx="20" ry="30" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 25 -10 Q 35 -15 45 -10 L 35 0 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 25 10 Q 35 15 45 10 L 35 0 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="15" cy="-8" r="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="15" cy="-8" r="1.5" fill="#1a1a1a"/>
    <path d="M 5 -15 Q 15 -18 25 -15" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M 5 -5 Q 15 -8 25 -5" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M 5 5 Q 15 2 25 5" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M 5 15 Q 15 12 25 15" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  
  <!-- Tropical fish 2 - Clownfish -->
  <g id="clownfish" transform="translate(350, 200)">
    <ellipse cx="0" cy="0" rx="35" ry="18" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 30 -8 Q 45 -12 50 -8 L 45 0 L 50 8 Q 45 12 30 8 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M -20 -15 Q -28 -20 -30 -15 L -25 -5 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M -20 15 Q -28 20 -30 15 L -25 5 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="-18" cy="-5" r="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="-18" cy="-5" r="1.5" fill="#1a1a1a"/>
    <path d="M -25 -10 L -25 10 M -10 -15 L -10 15 M 10 -15 L 10 15" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M -5 0 L 5 0" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  
  <!-- Sea turtle -->
  <g id="turtle" transform="translate(200, 280)">
    <ellipse cx="0" cy="0" rx="40" ry="30" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M -30 -15 L 30 -15 M -35 0 L 35 0 M -30 15 L 30 15" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M -20 -25 L -20 25 M -5 -25 L -5 25 M 10 -25 L 10 25 M 25 -25 L 25 25" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="-15" cy="-10" r="6" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="5" cy="-10" r="6" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="-15" cy="10" r="6" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="5" cy="10" r="6" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="20" cy="0" r="8" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="-48" cy="0" rx="12" ry="8" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <ellipse cx="-45" cy="-22" rx="10" ry="15" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <ellipse cx="-45" cy="22" rx="10" ry="15" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="-45" cy="-2" r="2" fill="#1a1a1a"/>
    <path d="M -48 1 L -52 4" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  
  <!-- Seahorse -->
  <g id="seahorse" transform="translate(80, 200)">
    <circle cx="0" cy="0" r="10" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 0 10 Q 5 20 3 30 Q 8 40 6 50 Q 10 60 8 70 Q 5 80 0 85" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 0 85 Q -8 90 -12 88 Q -8 85 0 85" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="3" cy="-3" r="2" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="3" cy="-3" r="1" fill="#1a1a1a"/>
    <path d="M 0 -8 Q -5 -12 -3 -15" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M -3 -15 L -4 -18 M -1 -16 L -2 -19" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M 3 15 Q 12 15 15 18 Q 12 22 8 20" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 6 35 Q 15 35 18 38 Q 15 42 11 40" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="3" y1="20" x2="8" y2="20" stroke="#1a1a1a" stroke-width="0.7"/>
    <line x1="4" y1="30" x2="9" y2="30" stroke="#1a1a1a" stroke-width="0.7"/>
    <line x1="6" y1="40" x2="11" y2="40" stroke="#1a1a1a" stroke-width="0.7"/>
    <line x1="7" y1="50" x2="12" y2="50" stroke="#1a1a1a" stroke-width="0.7"/>
    <line x1="6" y1="60" x2="11" y2="60" stroke="#1a1a1a" stroke-width="0.7"/>
    <line x1="4" y1="70" x2="9" y2="70" stroke="#1a1a1a" stroke-width="0.7"/>
  </g>
  
  <!-- Jellyfish -->
  <g id="jellyfish" transform="translate(420, 100)">
    <path d="M -25 0 Q -25 -20 0 -25 Q 25 -20 25 0 Q 20 10 0 12 Q -20 10 -25 0 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M -15 -10 Q -15 -18 0 -20 Q 15 -18 15 -10" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="-10" cy="-8" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <circle cx="0" cy="-10" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <circle cx="10" cy="-8" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M -18 10 Q -20 25 -18 40 Q -20 55 -18 70" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M -8 10 Q -10 28 -8 46 Q -10 64 -8 82" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 2 10 Q 0 30 2 50 Q 0 70 2 90" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 12 10 Q 10 28 12 46 Q 10 64 12 82" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 20 10 Q 18 25 20 40 Q 18 55 20 70" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  
  <!-- Starfish on sand -->
  <g id="starfish" transform="translate(50, 360)">
    <path d="M 0 -15 L 4 -5 L 15 -4 L 8 4 L 10 15 L 0 9 L -10 15 L -8 4 L -15 -4 L -4 -5 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="-9" r="1.5" fill="#1a1a1a"/>
    <circle cx="9" cy="-2" r="1.5" fill="#1a1a1a"/>
    <circle cx="6" cy="9" r="1.5" fill="#1a1a1a"/>
    <circle cx="-6" cy="9" r="1.5" fill="#1a1a1a"/>
    <circle cx="-9" cy="-2" r="1.5" fill="#1a1a1a"/>
  </g>
  
  <!-- Bubbles -->
  <g id="bubbles">
    <circle cx="120" cy="80" r="8" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="125" cy="83" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <circle cx="280" cy="120" r="10" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="286" cy="124" r="2.5" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <circle cx="180" cy="50" r="6" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="184" cy="53" r="1.5" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <circle cx="380" cy="70" r="7" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="385" cy="73" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <circle cx="300" cy="40" r="5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    
    <circle cx="90" cy="240" r="6" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="320" cy="260" r="7" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="460" cy="180" r="8" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  
  <!-- Seaweed -->
  <g id="seaweed">
    <path d="M 30 350 Q 25 320 30 290 Q 35 260 30 230 Q 25 200 30 170" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <ellipse cx="27" cy="300" rx="5" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="33" cy="270" rx="5" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="27" cy="240" rx="5" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="33" cy="210" rx="5" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    
    <path d="M 470 360 Q 465 325 470 290 Q 475 255 470 220 Q 465 185 470 150" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <ellipse cx="467" cy="310" rx="5" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="473" cy="275" rx="5" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="467" cy="240" rx="5" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="473" cy="205" rx="5" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="467" cy="170" rx="5" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  </g>
</svg>