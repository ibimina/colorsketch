<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Japanese Garden Landscape - Adult Coloring -->
  
  <!-- Sky -->
  <rect id="sky" x="0" y="0" width="400" height="150" fill="white" stroke="none"/>
  
  <!-- Moon -->
  <circle id="moon" cx="320" cy="60" r="35" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <circle id="moon-detail" cx="330" cy="55" r="8" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
  <circle id="moon-detail-2" cx="310" cy="70" r="5" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
  
  <!-- Distant mountains -->
  <path id="mountain-1" d="M0 150 Q50 80 100 150" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <path id="mountain-2" d="M80 150 Q140 60 200 150" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <path id="mountain-3" d="M180 150 Q250 90 320 150" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <path id="mountain-4" d="M300 150 Q350 100 400 150" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Pagoda -->
  <g id="pagoda">
    <!-- Base tier -->
    <rect id="pagoda-base" x="50" y="200" width="60" height="40" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <path id="pagoda-roof-1" d="M35 200 Q80 185 125 200" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="35" y1="200" x2="30" y2="195" stroke="#1a1a1a" stroke-width="0.8"/>
    <line x1="125" y1="200" x2="130" y2="195" stroke="#1a1a1a" stroke-width="0.8"/>
    
    <!-- Middle tier -->
    <rect id="pagoda-mid" x="55" y="165" width="50" height="35" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <path id="pagoda-roof-2" d="M42 165 Q80 152 118 165" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="42" y1="165" x2="37" y2="160" stroke="#1a1a1a" stroke-width="0.8"/>
    <line x1="118" y1="165" x2="123" y2="160" stroke="#1a1a1a" stroke-width="0.8"/>
    
    <!-- Top tier -->
    <rect id="pagoda-top" x="60" y="135" width="40" height="30" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <path id="pagoda-roof-3" d="M48 135 Q80 120 112 135" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="48" y1="135" x2="43" y2="130" stroke="#1a1a1a" stroke-width="0.8"/>
    <line x1="112" y1="135" x2="117" y2="130" stroke="#1a1a1a" stroke-width="0.8"/>
    
    <!-- Spire -->
    <line x1="80" y1="135" x2="80" y2="105" stroke="#1a1a1a" stroke-width="1"/>
    <circle id="pagoda-orb" cx="80" cy="100" r="5" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  
  <!-- Cherry blossom tree -->
  <g id="cherry-tree">
    <path id="tree-trunk" d="M300 400 Q290 350 280 300 Q275 270 290 250 Q285 230 310 200" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path id="tree-branch-1" d="M295 280 Q340 260 370 240" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path id="tree-branch-2" d="M290 250 Q250 230 220 210" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <path id="tree-branch-3" d="M310 200 Q350 180 380 170" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path id="tree-branch-4" d="M310 200 Q280 170 260 150" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    
    <!-- Blossom clusters -->
    <g id="blossoms">
      <circle id="blossom-1" cx="370" cy="240" r="15" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-2" cx="360" cy="225" r="12" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-3" cx="380" cy="230" r="10" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-4" cx="220" cy="210" r="14" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-5" cx="235" cy="200" r="11" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-6" cx="210" cy="195" r="10" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-7" cx="380" cy="170" r="13" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-8" cx="365" cy="160" r="10" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-9" cx="390" cy="180" r="8" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-10" cx="260" cy="150" r="12" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-11" cx="250" cy="140" r="10" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-12" cx="275" cy="145" r="9" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-13" cx="310" cy="195" r="14" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle id="blossom-14" cx="320" cy="180" r="12" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    </g>
  </g>
  
  <!-- Koi pond -->
  <ellipse id="pond" cx="200" cy="320" rx="120" ry="60" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <ellipse id="pond-inner" cx="200" cy="320" rx="110" ry="52" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Koi fish -->
  <g id="koi-1">
    <path id="koi-1-body" d="M180 310 Q195 300 215 310 Q230 320 220 330 L200 335 L180 330 Q170 320 180 310" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="koi-1-tail" d="M170 320 Q160 310 165 305 Q175 315 170 320 Q160 330 165 335 Q175 325 170 320" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle id="koi-1-eye" cx="212" cy="315" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
  </g>
  
  <g id="koi-2">
    <path id="koi-2-body" d="M230 335 Q245 328 260 338 Q272 348 262 355 L245 358 L228 352 Q220 343 230 335" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="koi-2-tail" d="M222 343 Q212 335 217 332 Q225 340 222 343 Q212 352 217 355 Q225 347 222 343" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle id="koi-2-eye" cx="257" cy="342" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
  </g>
  
  <!-- Water lily -->
  <g id="lily">
    <ellipse id="lily-pad" cx="150" cy="330" rx="25" ry="15" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="lily-pad-notch" d="M150 315 L145 330 L150 345" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <ellipse id="lily-flower" cx="150" cy="325" rx="10" ry="6" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <ellipse id="lily-petal-1" cx="145" cy="320" rx="4" ry="8" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <ellipse id="lily-petal-2" cx="155" cy="320" rx="4" ry="8" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <ellipse id="lily-petal-3" cx="150" cy="318" rx="3" ry="7" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <!-- Stone bridge -->
  <path id="bridge" d="M120 280 Q170 260 220 280" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <path id="bridge-rail-1" d="M125 278 L125 268" stroke="#1a1a1a" stroke-width="1"/>
  <path id="bridge-rail-2" d="M145 272 L145 262" stroke="#1a1a1a" stroke-width="1"/>
  <path id="bridge-rail-3" d="M170 268 L170 258" stroke="#1a1a1a" stroke-width="1"/>
  <path id="bridge-rail-4" d="M195 272 L195 262" stroke="#1a1a1a" stroke-width="1"/>
  <path id="bridge-rail-5" d="M215 278 L215 268" stroke="#1a1a1a" stroke-width="1"/>
  <path id="bridge-top" d="M125 268 Q170 250 215 268" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Stones around pond -->
  <ellipse id="stone-1" cx="90" cy="340" rx="15" ry="10" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <ellipse id="stone-2" cx="100" cy="355" rx="12" ry="8" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <ellipse id="stone-3" cx="310" cy="335" rx="18" ry="12" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <ellipse id="stone-4" cx="325" cy="350" rx="14" ry="9" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <!-- Bamboo in corner -->
  <g id="bamboo">
    <line x1="20" y1="400" x2="20" y2="250" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="20" y1="280" x2="20" y2="278" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="20" y1="320" x2="20" y2="318" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="20" y1="360" x2="20" y2="358" stroke="#1a1a1a" stroke-width="4"/>
    <path id="bamboo-leaf-1" d="M20 260 Q35 255 45 250" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="bamboo-leaf-2" d="M20 265 Q35 270 50 265" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="bamboo-leaf-3" d="M20 280 Q5 275 0 270" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  
  <!-- Falling petals -->
  <g id="petals">
    <ellipse id="petal-1" cx="180" cy="180" rx="4" ry="3" fill="white" stroke="#1a1a1a" stroke-width="0.3" transform="rotate(45 180 180)"/>
    <ellipse id="petal-2" cx="250" cy="200" rx="3" ry="2" fill="white" stroke="#1a1a1a" stroke-width="0.3" transform="rotate(-30 250 200)"/>
    <ellipse id="petal-3" cx="320" cy="130" rx="4" ry="3" fill="white" stroke="#1a1a1a" stroke-width="0.3" transform="rotate(60 320 130)"/>
    <ellipse id="petal-4" cx="200" cy="250" rx="3" ry="2" fill="white" stroke="#1a1a1a" stroke-width="0.3" transform="rotate(-20 200 250)"/>
  </g>
</svg>