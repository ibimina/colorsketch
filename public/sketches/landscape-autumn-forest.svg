<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Autumn Forest Landscape - Adult Coloring -->
  
  <!-- Sky -->
  <rect x="0" y="0" width="500" height="150" fill="white" stroke="none"/>
  
  <!-- Distant trees background -->
  <g id="forest-background">
    <path d="M 0 120 L 50 80 L 80 100 L 120 70 L 160 90 L 200 60 L 240 85 L 280 65 L 320 90 L 360 70 L 400 95 L 450 75 L 480 90 L 500 80 L 500 400 L 0 400 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  
  <!-- Large oak tree left -->
  <g id="oak-tree-left" transform="translate(100, 180)">
    <!-- Trunk -->
    <path d="M -15 0 Q -18 40 -12 80 Q -15 120 -10 160 L 10 160 Q 15 120 12 80 Q 18 40 15 0 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Bark texture -->
    <path d="M -12 30 Q -5 28 2 30" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M -11 60 Q -4 58 3 60" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M -10 90 Q -3 88 4 90" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M -11 120 Q -4 118 3 120" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M -10 150 Q -3 148 4 150" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <!-- Branches -->
    <path d="M -10 30 Q -30 20 -45 15" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 10 30 Q 30 20 45 15" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M -8 50 Q -35 40 -50 30" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 8 50 Q 35 40 50 30" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 0 10 Q -15 -5 -20 -15" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 0 10 Q 15 -5 20 -15" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Leaf canopy - autumn oak leaves -->
    <g id="canopy">
      <path d="M -50 0 Q -60 -20 -55 -40 Q -45 -55 -25 -50 Q -10 -60 5 -55 Q 20 -60 35 -55 Q 50 -60 60 -45 Q 65 -25 55 -10 Q 60 5 50 15 Q 35 5 20 10 Q 5 5 -10 10 Q -25 5 -40 10 Q -55 5 -50 0 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
      
      <!-- Leaf vein patterns -->
      <path d="M -40 -10 L -35 -15 L -30 -12" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M -25 -25 L -20 -30 L -15 -27" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 0 -30 L 5 -35 L 10 -32" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 25 -25 L 30 -30 L 35 -27" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 40 -10 L 45 -15 L 50 -12" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M -30 5 L -25 0 L -20 3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 0 0 L 5 -5 L 10 -2" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 30 5 L 35 0 L 40 3" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    </g>
  </g>
  
  <!-- Maple tree right -->
  <g id="maple-tree-right" transform="translate(380, 200)">
    <!-- Trunk -->
    <path d="M -12 0 Q -14 35 -10 70 Q -12 105 -8 140 L 8 140 Q 12 105 10 70 Q 14 35 12 0 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Bark texture -->
    <path d="M -10 25 Q -4 23 2 25" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M -9 50 Q -3 48 3 50" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M -10 75 Q -4 73 2 75" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M -9 100 Q -3 98 3 100" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M -8 125 Q -2 123 4 125" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <!-- Branches -->
    <path d="M -8 25 Q -25 15 -35 10" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 8 25 Q 25 15 35 10" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M -6 45 Q -28 35 -40 25" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 6 45 Q 28 35 40 25" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Maple canopy -->
    <path d="M -45 5 Q -50 -15 -40 -35 Q -30 -45 -15 -40 Q -5 -50 10 -45 Q 25 -50 35 -40 Q 45 -50 55 -35 Q 60 -15 50 0 Q 55 15 45 25 Q 30 15 15 20 Q 0 15 -15 20 Q -30 15 -45 20 Q -50 10 -45 5 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Maple leaf patterns in canopy -->
    <g id="maple-leaves">
      <path d="M -25 -15 L -25 -22 L -20 -18 L -22 -12 L -28 -12 Z" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 0 -20 L 0 -27 L 5 -23 L 3 -17 L -3 -17 Z" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 25 -15 L 25 -22 L 30 -18 L 28 -12 L 22 -12 Z" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M -30 5 L -30 -2 L -25 2 L -27 8 L -33 8 Z" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 5 0 L 5 -7 L 10 -3 L 8 3 L 2 3 Z" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
      <path d="M 35 5 L 35 -2 L 40 2 L 38 8 L 32 8 Z" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    </g>
  </g>
  
  <!-- Mid-ground birch tree -->
  <g id="birch-tree" transform="translate(250, 220)">
    <!-- Trunk -->
    <rect x="-8" y="0" width="16" height="120" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Birch bark markings -->
    <rect x="-8" y="15" width="16" height="4" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="-8" y="35" width="16" height="3" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="-6" y="50" width="12" height="5" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="-7" y="70" width="14" height="4" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="-8" y="90" width="16" height="3" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="-6" y="105" width="12" height="4" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    
    <!-- Branches with autumn leaves -->
    <path d="M -5 20 Q -20 10 -30 5" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="-25" cy="8" r="8" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="-32" cy="10" r="6" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    
    <path d="M 5 20 Q 20 10 30 5" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="25" cy="8" r="8" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="32" cy="10" r="6" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    
    <path d="M -5 45 Q -18 35 -25 30" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="-22" cy="33" r="7" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    
    <path d="M 5 45 Q 18 35 25 30" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="22" cy="33" r="7" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  
  <!-- Falling leaves -->
  <g id="falling-leaves">
    <g transform="translate(180, 150) rotate(25)">
      <path d="M 0 0 Q -3 5 0 10 Q 3 5 0 0" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#1a1a1a" stroke-width="0.7"/>
    </g>
    
    <g transform="translate(320, 180) rotate(-15)">
      <path d="M 0 0 L -4 -2 L -3 3 L 0 8 L 3 3 L 4 -2 Z" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1a1a1a" stroke-width="0.7"/>
    </g>
    
    <g transform="translate(280, 130) rotate(40)">
      <path d="M 0 0 Q -3 5 0 10 Q 3 5 0 0" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#1a1a1a" stroke-width="0.7"/>
    </g>
    
    <g transform="translate(150, 200) rotate(-30)">
      <path d="M 0 0 L -4 -2 L -3 3 L 0 8 L 3 3 L 4 -2 Z" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1a1a1a" stroke-width="0.7"/>
    </g>
    
    <g transform="translate(400, 160) rotate(20)">
      <path d="M 0 0 Q -3 5 0 10 Q 3 5 0 0" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1a1a1a" stroke-width="0.7"/>
    </g>
  </g>
  
  <!-- Forest floor with leaves and mushrooms -->
  <g id="forest-floor">
    <!-- Ground line -->
    <path d="M 0 340 Q 50 335 100 340 Q 150 345 200 340 Q 250 335 300 340 Q 350 345 400 340 Q 450 335 500 340 L 500 400 L 0 400 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Fallen leaves on ground -->
    <g transform="translate(50, 350)">
      <path d="M 0 0 Q -5 3 -4 8 L 0 10 L 4 8 Q 5 3 0 0" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
    
    <g transform="translate(120, 355)">
      <path d="M 0 0 L -5 -2 L -4 4 L 0 9 L 4 4 L 5 -2 Z" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="9" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
    
    <g transform="translate(190, 352)">
      <path d="M 0 0 Q -5 3 -4 8 L 0 10 L 4 8 Q 5 3 0 0" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
    
    <g transform="translate(330, 358)">
      <path d="M 0 0 L -5 -2 L -4 4 L 0 9 L 4 4 L 5 -2 Z" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="9" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
    
    <g transform="translate(440, 353)">
      <path d="M 0 0 Q -5 3 -4 8 L 0 10 L 4 8 Q 5 3 0 0" fill="white" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
    
    <!-- Mushrooms -->
    <g transform="translate(220, 350)">
      <ellipse cx="0" cy="0" rx="10" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 Q -10 -8 -15 -12 T -12 -18 Q 0 -15 12 -18 T 15 -12 Q 10 -8 0 0" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="-8" cy="-15" r="2" fill="white" stroke="#1a1a1a" stroke-width="0.7"/>
      <circle cx="5" cy="-14" r="1.5" fill="white" stroke="#1a1a1a" stroke-width="0.7"/>
      <circle cx="-3" cy="-17" r="1.5" fill="white" stroke="#1a1a1a" stroke-width="0.7"/>
    </g>
    
    <g transform="translate(290, 355)">
      <ellipse cx="0" cy="0" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 Q -8 -6 -12 -10 T -10 -14 Q 0 -12 10 -14 T 12 -10 Q 8 -6 0 0" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="-6" cy="-12" r="1.5" fill="white" stroke="#1a1a1a" stroke-width="0.7"/>
      <circle cx="4" cy="-11" r="1" fill="white" stroke="#1a1a1a" stroke-width="0.7"/>
    </g>
    
    <!-- Acorns -->
    <g transform="translate(360, 360)">
      <ellipse cx="0" cy="0" rx="4" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M -4 -3 Q -4 -6 0 -7 Q 4 -6 4 -3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M -3 -4 L 3 -4 M -2 -5 L 2 -5" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
    
    <g transform="translate(380, 365)">
      <ellipse cx="0" cy="0" rx="4" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M -4 -3 Q -4 -6 0 -7 Q 4 -6 4 -3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M -3 -4 L 3 -4 M -2 -5 L 2 -5" stroke="#1a1a1a" stroke-width="0.5"/>
    </g>
  </g>
  
  <!-- Squirrel -->
  <g id="squirrel" transform="translate(170, 330)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Head -->
    <circle cx="-10" cy="-6" r="7" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Ear -->
    <path d="M -13 -11 L -15 -15 L -11 -13" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Eye -->
    <circle cx="-12" cy="-7" r="1.5" fill="#1a1a1a"/>
    <!-- Nose -->
    <circle cx="-15" cy="-4" r="1" fill="#1a1a1a"/>
    <!-- Tail -->
    <path d="M 8 -2 Q 15 -8 18 -15 Q 20 -20 18 -25" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 10 -5 Q 13 -10 15 -16" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <!-- Legs -->
    <ellipse cx="-5" cy="5" rx="3" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="3" cy="5" rx="3" ry="5" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Front paws -->
    <circle cx="-8" cy="-1" r="2" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  </g>
</svg>