<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Sea Turtle - Marine Life -->
  
  <!-- Shell (Carapace) -->
  <ellipse id="shell" cx="200" cy="200" rx="130" ry="100" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
