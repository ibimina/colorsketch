<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Playful Dolphin - Ocean Theme -->
  
  <!-- Water Splash -->
  <path id="splash-1" d="M50 350 Q60 330 55 310 Q70 320 80 300" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <path id="splash-2" d="M350 340 Q340 320 350 300 Q330 310 320 290" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  
  <!-- Water drops -->
  <ellipse id="drop-1" cx="70" cy="290" rx="5" ry="8" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <ellipse id="drop-2" cx="330" cy="280" rx="4" ry="6" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <ellipse id="drop-3" cx="100" cy="310" rx="3" ry="5" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  
  <!-- Body -->
  <path id="body" d="M60 200 Q100 120 200 100 Q300 90 350 140 Q380 180 370 220 Q360 260 300 290 Q240 310 180 300 Q120 285 80 250 Q50 220 60 200" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Belly -->
  <path id="belly" d="M100 220 Q150 260 230 260 Q290 255 330 230 Q300 270 230 285 Q160 290 110 260 Q90 245 100 220" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  
  <!-- Dorsal Fin -->
  <path id="dorsal-fin" d="M200 100 Q210 60 240 40 Q255 50 250 80 Q245 100 230 110" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Pectoral Fin -->
  <path id="pectoral-fin" d="M150 220 Q120 250 100 290 Q115 295 140 270 Q160 245 165 225" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Tail Flukes -->
  <path id="tail-upper" d="M60 200 Q30 180 15 150 Q25 155 45 170 Q55 185 60 195" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <path id="tail-lower" d="M60 205 Q30 225 15 260 Q25 250 45 235 Q55 220 60 210" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Snout (Rostrum) -->
  <path id="snout" d="M355 165 Q380 170 395 180 Q385 190 360 190 Q345 185 355 165" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Eye -->
  <circle id="eye" cx="320" cy="160" r="12" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="322" cy="158" r="6" fill="#1a1a1a"/>
  <circle cx="324" cy="156" r="2" fill="white"/>
  
  <!-- Smile Line -->
  <path d="M340 175 Q360 185 380 180" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  
  <!-- Blowhole -->
  <ellipse id="blowhole" cx="280" cy="105" rx="6" ry="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Bubbles -->
  <circle id="bubble-1" cx="340" cy="320" r="10" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle id="bubble-2" cx="355" cy="340" r="7" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle id="bubble-3" cx="365" cy="360" r="5" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle id="bubble-4" cx="320" cy="350" r="6" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle id="bubble-5" cx="90" cy="340" r="8" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle id="bubble-6" cx="75" cy="365" r="5" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
  
  <!-- Water Line -->
  <path d="M20 380 Q60 370 100 380 Q140 390 180 380 Q220 370 260 380 Q300 390 340 380 Q380 370 400 380" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>
  
  <!-- Starfish -->
  <path id="starfish" d="M50 380 L55 365 L60 380 L75 375 L65 385 L75 395 L60 390 L55 400 L50 390 L35 395 L45 385 L35 375 Z" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
</svg>