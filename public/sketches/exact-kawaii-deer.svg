<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Exact Kawaii Deer Approximation -->
  <g id="body">
    <path d="M 150 400 L 160 480 Q 165 490 175 480 L 180 400" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 230 400 L 220 480 Q 215 490 205 480 L 200 400" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 120 350 L 130 460 Q 135 470 145 460 L 150 380" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 260 350 L 250 460 Q 245 470 235 460 L 230 380" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 140 280 C 100 320 100 380 140 400 C 180 420 250 420 260 400 C 280 350 240 280 200 280 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Tail -->
    <path d="M 110 360 C 80 350 70 380 100 390 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Chest Fluff -->
    <path d="M 160 280 L 170 340 L 180 320 L 200 360 L 210 320 L 220 340 L 230 280 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  </g>

  <g id="head">
    <path d="M 140 180 Q 130 250 160 270 Q 200 290 240 270 Q 270 250 260 180 Q 250 130 200 130 Q 150 130 140 180 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Hair fluff -->
    <path d="M 170 130 Q 180 100 200 120 Q 220 100 230 130" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Ears -->
    <path d="M 140 160 Q 60 130 50 160 Q 60 220 150 200" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 130 165 Q 80 150 70 165 Q 80 190 135 185" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    
    <path d="M 260 160 Q 340 130 350 160 Q 340 220 250 200" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 270 165 Q 320 150 330 165 Q 320 190 265 185" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    
    <!-- Antlers -->
    <path d="M 170 120 L 140 50 M 150 80 L 120 70 M 145 60 L 160 40" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    <path d="M 230 120 L 260 50 M 250 80 L 280 70 M 255 60 L 240 40" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>

    <!-- Eyes -->
    <g id="eye-left">
      <ellipse cx="165" cy="180" rx="15" ry="25" fill="white" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="165" cy="180" rx="12" ry="20" fill="#1a1a1a"/>
      <circle cx="168" cy="170" r="4" fill="white"/>
      <circle cx="160" cy="185" r="2" fill="white"/>
      <path d="M 150 160 Q 165 145 180 155" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
      <!-- lashes -->
      <line x1="145" y1="165" x2="135" y2="160" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      <line x1="150" y1="158" x2="140" y2="150" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g id="eye-right">
      <ellipse cx="235" cy="180" rx="15" ry="25" fill="white" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="235" cy="180" rx="12" ry="20" fill="#1a1a1a"/>
      <circle cx="232" cy="170" r="4" fill="white"/>
      <circle cx="240" cy="185" r="2" fill="white"/>
      <path d="M 250 160 Q 235 145 220 155" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
      <!-- lashes -->
      <line x1="255" y1="165" x2="265" y2="160" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
      <line x1="250" y1="158" x2="260" y2="150" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Nose and Mouth -->
    <ellipse cx="200" cy="220" rx="12" ry="8" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 200 228 L 200 240 M 200 240 Q 185 245 180 235 M 200 240 Q 215 245 220 235" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 190 240 Q 200 250 210 240 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
</svg>