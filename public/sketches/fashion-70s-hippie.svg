    <path id="band" d="M80 95 Q120 80 200 75 Q280 80 320 95" fill="none" stroke="#1a1a1a" stroke-width="3"/>
    <path id="band-pattern" d="M100 88 Q120 82 140 88 Q160 82 180 88 Q200 82 220 88 Q240 82 260 88 Q280 82 300 88" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
