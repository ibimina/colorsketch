      <path id="pp-3" d="M140 380 Q150 375 165 382" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
      <path id="pp-4" d="M235 320 Q245 315 255 322" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
      <path id="pp-5" d="M238 350 Q248 345 258 352" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
      <path id="pp-6" d="M240 380 Q250 375 262 382" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
