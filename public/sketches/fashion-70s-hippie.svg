      <line x1="145" y1="275" x2="140" y2="295" stroke="#1a1a1a" stroke-width="0.5"/>
      <line x1="155" y1="277" x2="150" y2="297" stroke="#1a1a1a" stroke-width="0.5"/>
      <line x1="165" y1="279" x2="160" y2="299" stroke="#1a1a1a" stroke-width="0.5"/>
