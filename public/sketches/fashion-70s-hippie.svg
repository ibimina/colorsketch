    <path id="hw-2" d="M55 250 Q65 245 75 255" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="hw-3" d="M60 300 Q70 295 80 305" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="hw-4" d="M330 200 Q340 195 350 205" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="hw-5" d="M335 250 Q345 245 355 255" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="hw-6" d="M330 300 Q340 295 350 305" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
