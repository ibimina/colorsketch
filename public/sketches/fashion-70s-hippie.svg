    <circle id="peace-outer" cx="200" cy="200" r="15" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <line x1="200" y1="185" x2="200" y2="215" stroke="#1a1a1a" stroke-width="0.6"/>
    <line x1="200" y1="200" x2="189" y2="213" stroke="#1a1a1a" stroke-width="0.6"/>
    <line x1="200" y1="200" x2="211" y2="213" stroke="#1a1a1a" stroke-width="0.6"/>
  </g>
  
  <!-- Headband -->
