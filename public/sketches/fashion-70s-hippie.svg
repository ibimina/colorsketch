    <circle id="lens-r" cx="230" cy="110" r="25" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
    <circle id="lens-r-inner" cx="230" cy="110" r="18" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
    <path id="bridge" d="M195 110 Q200 105 205 110" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path id="arm-l" d="M145 105 Q130 105 115 115" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="arm-r" d="M255 105 Q270 105 285 115" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  
