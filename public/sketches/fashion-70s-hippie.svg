    <path id="bell-r" d="M220 400 Q240 395 250 400" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="bell-r-2" d="M270 400 Q290 395 310 400" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    
