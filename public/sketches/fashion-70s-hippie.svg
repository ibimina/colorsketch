      <line x1="265" y1="272" x2="270" y2="292" stroke="#1a1a1a" stroke-width="0.5"/>
      <line x1="255" y1="275" x2="260" y2="295" stroke="#1a1a1a" stroke-width="0.5"/>
      <line x1="245" y1="277" x2="250" y2="297" stroke="#1a1a1a" stroke-width="0.5"/>
