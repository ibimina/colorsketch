    <ellipse id="bracelet-l-2" cx="73" cy="318" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <ellipse id="bracelet-r-1" cx="328" cy="310" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <ellipse id="bracelet-r-2" cx="327" cy="318" rx="8" ry="4" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
