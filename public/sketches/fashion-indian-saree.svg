<svg viewBox="0 0 350 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Fashion - Indian Saree - Adult Coloring -->
  
  <!-- Skirt base (saree drape) -->
  <path id="skirt" d="M 140 320 L 120 500 L 230 500 L 210 320 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Skirt pleats and patterns -->
  <g id="skirt-patterns">
    <line x1="140" y1="340" x2="120" y2="500" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="150" y1="340" x2="135" y2="500" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="160" y1="340" x2="150" y2="500" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="170" y1="340" x2="165" y2="500" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="180" y1="340" x2="180" y2="500" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="190" y1="340" x2="195" y2="500" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="200" y1="340" x2="210" y2="500" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="210" y1="340" x2="230" y2="500" stroke="#1a1a1a" stroke-width="1"/>
    
    <!-- Paisley pattern on saree -->
    <ellipse cx="155" cy="400" rx="8" ry="12" fill="none" stroke="#1a1a1a" stroke-width="0.7" transform="rotate(20 155 400)"/>
    <path d="M 155 388 Q 160 385 163 390" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="157" cy="395" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    
    <ellipse cx="185" cy="420" rx="8" ry="12" fill="none" stroke="#1a1a1a" stroke-width="0.7" transform="rotate(-15 185 420)"/>
    <path d="M 185 408 Q 190 405 193 410" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="187" cy="415" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    
    <ellipse cx="200" cy="450" rx="8" ry="12" fill="none" stroke="#1a1a1a" stroke-width="0.7" transform="rotate(10 200 450)"/>
    <path d="M 200 438 Q 205 435 208 440" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="202" cy="445" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    
    <!-- Border pattern at hem -->
    <path d="M 120 480 Q 135 475 150 480 Q 165 485 180 480 Q 195 475 210 480 Q 220 485 230 480" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="135" cy="477" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle cx="165" cy="482" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle cx="195" cy="477" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle cx="220" cy="482" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  </g>
  
  <!-- Pallu (decorative drape over shoulder) -->
  <path id="pallu" d="M 220 180 Q 250 200 260 240 Q 265 280 250 320 L 240 340 L 210 320 Q 200 280 205 240 Q 210 200 220 180 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Pallu elaborate patterns -->
  <g id="pallu-patterns">
    <path d="M 225 200 Q 235 210 240 220 Q 235 230 230 240" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <path d="M 230 250 Q 240 260 245 270 Q 240 280 235 290" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <path d="M 235 300 Q 243 310 246 320 Q 242 328 238 335" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    
    <circle cx="230" cy="210" r="4" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle cx="238" cy="230" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle cx="235" cy="260" r="4" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle cx="243" cy="280" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle cx="240" cy="310" r="4" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    
    <path d="M 217 200 L 215 210 L 220 215 L 218 205 Z" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <path d="M 212 240 L 210 250 L 215 255 L 213 245 Z" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <path d="M 213 280 L 211 290 L 216 295 L 214 285 Z" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  </g>
  
  <!-- Blouse (choli) -->
  <path id="blouse" d="M 145 180 L 115 220 L 110 280 L 130 320 L 220 320 Q 210 240 210 180 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Blouse embroidery patterns -->
  <g id="blouse-patterns">
    <path d="M 150 200 Q 160 195 170 200 Q 180 195 190 200 Q 200 195 210 200" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M 145 220 Q 155 215 165 220 Q 175 215 185 220 Q 195 215 205 220" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M 140 240 Q 150 235 160 240 Q 170 235 180 240 Q 190 235 200 240" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M 135 260 Q 145 255 155 260 Q 165 255 175 260 Q 185 255 195 260" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M 135 280 Q 145 275 155 280 Q 165 275 175 280 Q 185 275 195 280" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M 140 300 Q 150 295 160 300 Q 170 295 180 300 Q 190 295 200 300" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <circle cx="160" cy="205" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="180" cy="205" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="155" cy="230" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="175" cy="230" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="150" cy="250" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="170" cy="250" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <!-- Sleeves -->
  <g id="sleeves">
    <path id="sleeve-l" d="M 115 220 L 60 240 L 50 270 L 70 285 L 110 280 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 100 240 Q 90 245 80 250" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <path d="M 95 260 Q 85 265 75 270" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle cx="85" cy="255" r="2.5" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <!-- Torso/waist -->
  <ellipse id="torso" cx="175" cy="240" rx="50" ry="70" fill="none" stroke="none"/>
  
  <!-- Neck -->
  <rect id="neck" x="165" y="155" width="20" height="30" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Head -->
  <ellipse id="head" cx="175" cy="130" rx="35" ry="40" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Bindi -->
  <circle id="bindi" cx="175" cy="115" r="3" fill="#1a1a1a"/>
  
  <!-- Eyes -->
  <g id="eyes">
    <path d="M 160 125 Q 165 122 170 125" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="165" cy="124" r="2" fill="#1a1a1a"/>
    
    <path d="M 180 125 Q 185 122 190 125" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="185" cy="124" r="2" fill="#1a1a1a"/>
  </g>
  
  <!-- Nose -->
  <path id="nose" d="M 175 130 L 173 140" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Mouth -->
  <path id="mouth" d="M 168 148 Q 175 152 182 148" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Hair with bun and flowers -->
  <g id="hair">
    <ellipse id="hair-top" cx="175" cy="95" rx="38" ry="35" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 150 110 Q 145 130 145 150" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 200 110 Q 205 130 205 150" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Hair bun -->
    <circle id="bun" cx="175" cy="75" rx="25" ry="25" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 160 75 Q 165 70 170 75 Q 175 70 180 75 Q 185 70 190 75" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <path d="M 160 82 Q 165 77 170 82 Q 175 77 180 82 Q 185 77 190 82" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    
    <!-- Flowers in hair -->
    <g id="hair-flowers">
      <circle cx="155" cy="70" r="6" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
      <circle cx="155" cy="70" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
      <circle cx="150" cy="68" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle cx="160" cy="68" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle cx="153" cy="74" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle cx="157" cy="74" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
      
      <circle cx="195" cy="70" r="6" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
      <circle cx="195" cy="70" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
      <circle cx="190" cy="68" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle cx="200" cy="68" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle cx="193" cy="74" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
      <circle cx="197" cy="74" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    </g>
  </g>
  
  <!-- Jewelry - Necklace -->
  <g id="necklace">
    <path d="M 155 175 Q 175 185 195 175" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="165" cy="178" r="3" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="175" cy="183" r="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="185" cy="178" r="3" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Pendant -->
    <path d="M 175 183 L 175 195" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="175" cy="200" rx="5" ry="7" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
    <circle cx="175" cy="200" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  </g>
  
  <!-- Earrings -->
  <g id="earrings">
    <circle cx="145" cy="135" r="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="145" cy="143" r="3" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="145" y1="135" x2="145" y2="143" stroke="#1a1a1a" stroke-width="0.8"/>
    
    <circle cx="205" cy="135" r="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="205" cy="143" r="3" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="205" y1="135" x2="205" y2="143" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  
  <!-- Arm with bangles -->
  <g id="arm">
    <rect x="50" y="270" width="15" height="50" rx="5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="50" y1="280" x2="65" y2="280" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="50" y1="290" x2="65" y2="290" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="50" y1="300" x2="65" y2="300" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="50" y1="310" x2="65" y2="310" stroke="#1a1a1a" stroke-width="1"/>
    
    <!-- Hand -->
    <ellipse cx="57" cy="325" rx="8" ry="6" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
</svg>