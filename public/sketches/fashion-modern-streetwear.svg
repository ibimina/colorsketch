<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Fashion - Modern Streetwear - Adult Coloring -->
  
  <!-- Sneakers -->
  <g id="sneakers">
    <ellipse id="shoe-l" cx="170" cy="490" rx="30" ry="12" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 150 485 L 145 475 L 155 470 L 185 470 L 190 475 L 188 485" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 160 470 Q 170 465 180 470" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="155" y1="475" x2="185" y2="475" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="157" y1="480" x2="183" y2="480" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="165" cy="477" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle cx="175" cy="477" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    
    <ellipse id="shoe-r" cx="230" cy="490" rx="30" ry="12" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 210 485 L 205 475 L 215 470 L 245 470 L 250 475 L 248 485" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 220 470 Q 230 465 240 470" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="215" y1="475" x2="245" y2="475" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="217" y1="480" x2="243" y2="480" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="225" cy="477" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle cx="235" cy="477" r="2" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  </g>
  
  <!-- Pants (cargo style) -->
  <g id="pants">
    <path id="pant-l" d="M 150 320 L 145 470 L 165 470 L 175 470 L 180 320 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path id="pant-r" d="M 220 320 L 215 470 L 235 470 L 245 470 L 250 320 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Cargo pockets -->
    <rect x="147" y="350" width="25" height="35" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="147" y1="365" x2="172" y2="365" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="222" y="350" width="25" height="35" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="222" y1="365" x2="247" y2="365" stroke="#1a1a1a" stroke-width="1"/>
    
    <!-- Seams and details -->
    <line x1="163" y1="320" x2="163" y2="470" stroke="#1a1a1a" stroke-width="0.7"/>
    <line x1="235" y1="320" x2="235" y2="470" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <!-- Knee patches/distress -->
    <path d="M 155 410 Q 165 405 175 410" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M 158 415 Q 165 412 172 415" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <path d="M 225 410 Q 235 405 245 410" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M 228 415 Q 235 412 242 415" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  
  <!-- Belt -->
  <rect id="belt" x="140" y="310" width="120" height="15" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
