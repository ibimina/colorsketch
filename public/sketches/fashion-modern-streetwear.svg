  <circle cx="200" cy="317" r="3" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Hoodie body -->
  <path id="hoodie" d="M 130 170 L 120 310 L 180 320 L 220 320 L 280 310 L 270 170 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Hoodie center zipper -->
  <line x1="200" y1="180" x2="200" y2="315" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="195" y1="190" x2="205" y2="190" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="195" y1="210" x2="205" y2="210" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="195" y1="230" x2="205" y2="230" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="195" y1="250" x2="205" y2="250" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="195" y1="270" x2="205" y2="270" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="195" y1="290" x2="205" y2="290" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="195" y1="310" x2="205" y2="310" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Hoodie pockets -->
  <path d="M 145 260 Q 155 270 165 260" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M 235 260 Q 245 270 255 260" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Hood -->
  <path id="hood" d="M 160 140 Q 150 110 160 80 Q 180 60 200 58 Q 220 60 240 80 Q 250 110 240 140" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M 165 135 Q 160 110 168 85 Q 185 70 200 68 Q 215 70 232 85 Q 240 110 235 135" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Hood drawstrings -->
  <circle cx="175" cy="155" r="3" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="185" cy="158" r="3" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="215" cy="158" r="3" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="225" cy="155" r="3" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Sleeves -->
  <g id="sleeves">
    <path id="sleeve-l" d="M 130 170 L 70 200 L 60 280 L 100 300 L 120 310" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="95" y1="210" x2="105" y2="300" stroke="#1a1a1a" stroke-width="0.7"/>
    
    <path id="sleeve-r" d="M 270 170 L 330 200 L 340 280 L 300 300 L 280 310" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="305" y1="210" x2="295" y2="300" stroke="#1a1a1a" stroke-width="0.7"/>
  </g>
  
  <!-- Hands -->
  <g id="hands">
    <ellipse cx="80" cy="305" rx="12" ry="8" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <ellipse cx="320" cy="305" rx="12" ry="8" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  
  <!-- Head -->
  <ellipse id="head" cx="200" cy="120" rx="35" ry="40" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Face -->
  <g id="eyes">
    <path d="M 180 115 Q 185 112 190 115" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="185" cy="114" r="2" fill="#1a1a1a"/>
    
    <path d="M 210 115 Q 215 112 220 115" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="215" cy="114" r="2" fill="#1a1a1a"/>
  </g>
  
  <path id="nose" d="M 200 120 L 198 130" stroke="#1a1a1a" stroke-width="1"/>
  <path id="mouth" d="M 192 140 Q 200 144 208 140" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Hair (casual style) -->
  <g id="hair">
    <ellipse id="hair-top" cx="200" cy="95" rx="37" ry="35" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 170 105 Q 165 120 163 135" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 230 105 Q 235 120 237 135" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Hair texture -->
    <path d="M 175 85 Q 185 80 195 85 Q 205 80 215 85 Q 225 80 235 85" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <path d="M 170 100 Q 180 95 190 100 Q 200 95 210 100 Q 220 95 230 100" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  
  <!-- Backpack straps -->
  <g id="backpack-straps">
    <path d="M 155 180 Q 150 200 148 230" fill="none" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M 245 180 Q 250 200 252 230" fill="none" stroke="#1a1a1a" stroke-width="3"/>
    
    <rect x="146" y="230" width="6" height="15" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="250" y="230" width="6" height="15" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  
  <!-- Logo on hoodie -->
  <g id="logo">
    <circle cx="155" cy="210" r="12" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <path d="M 150 205 L 160 215 M 160 205 L 150 215" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
</svg>