<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Ocean Sunset Landscape - Adult Coloring -->
  
  <!-- Sky with gradient effect lines -->
  <rect id="sky" x="0" y="0" width="400" height="200" fill="white" stroke="none"/>
  
  <!-- Sky texture lines -->
  <g id="sky-lines">
    <path id="sky-line-1" d="M0 20 Q100 25 200 20 Q300 15 400 22" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
    <path id="sky-line-2" d="M0 40 Q100 45 200 38 Q300 32 400 42" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
    <path id="sky-line-3" d="M0 60 Q100 58 200 62 Q300 66 400 60" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
  </g>
  
  <!-- Setting sun -->
  <circle id="sun" cx="200" cy="150" r="50" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle id="sun-inner" cx="200" cy="150" r="40" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Sun reflection path on water -->
  <path id="sun-reflect-main" d="M180 200 Q190 220 200 240 Q210 260 200 280 Q190 300 200 320 Q210 340 200 360 Q190 380 200 400" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Clouds around sun -->
  <g id="sunset-clouds">
    <path id="cloud-1" d="M80 130 Q100 120 125 128 Q150 136 175 125" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="cloud-2" d="M225 125 Q250 136 275 128 Q300 120 320 130" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="cloud-3" d="M50 160 Q80 150 110 158 Q140 166 160 155" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <path id="cloud-4" d="M240 155 Q260 166 290 158 Q320 150 350 160" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <path id="cloud-5" d="M30 100 Q60 90 90 98 Q120 106 150 100" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="cloud-6" d="M250 100 Q280 106 310 98 Q340 90 370 100" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <!-- Horizon line -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Ocean waves -->
  <g id="waves">
    <path id="wave-1" d="M0 210 Q20 205 40 212 Q60 219 80 210 Q100 201 120 212 Q140 223 160 210 Q180 197 200 212 Q220 227 240 210 Q260 193 280 212 Q300 231 320 210 Q340 189 360 212 Q380 235 400 210" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    
    <path id="wave-2" d="M0 230 Q25 223 50 232 Q75 241 100 230 Q125 219 150 232 Q175 245 200 230 Q225 215 250 232 Q275 249 300 230 Q325 211 350 232 Q375 253 400 230" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    
    <path id="wave-3" d="M0 255 Q30 246 60 257 Q90 268 120 255 Q150 242 180 257 Q210 272 240 255 Q270 238 300 257 Q330 276 360 255 Q390 234 400 255" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    
    <path id="wave-4" d="M0 280 Q35 270 70 282 Q105 294 140 280 Q175 266 210 282 Q245 298 280 280 Q315 262 350 282 Q385 302 400 280" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    
    <path id="wave-5" d="M0 305 Q40 293 80 307 Q120 321 160 305 Q200 289 240 307 Q280 325 320 305 Q360 285 400 307" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    
    <path id="wave-6" d="M0 330 Q45 316 90 332 Q135 348 180 330 Q225 312 270 332 Q315 352 360 330 Q400 310 400 332" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  
  <!-- Water texture details -->
  <g id="water-details">
    <path id="ripple-1" d="M100 220 Q110 218 120 222" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
    <path id="ripple-2" d="M280 240 Q290 238 300 242" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
    <path id="ripple-3" d="M50 265 Q60 263 70 267" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
    <path id="ripple-4" d="M320 275 Q330 273 340 277" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
  </g>
  
  <!-- Sailboat silhouette -->
  <g id="sailboat">
    <path id="boat-hull" d="M130 195 L120 210 L170 210 L160 195 Z" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="145" y1="210" x2="145" y2="160" stroke="#1a1a1a" stroke-width="1"/>
    <path id="sail-main" d="M147 165 L147 200 L175 195 Z" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="sail-front" d="M143 170 L143 200 L125 195 Z" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  
  <!-- Another distant boat -->
  <g id="boat-distant">
    <path id="boat-2-hull" d="M320 188 L316 195 L340 195 L336 188 Z" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
    <line x1="328" y1="195" x2="328" y2="175" stroke="#1a1a1a" stroke-width="0.6"/>
    <path id="sail-2" d="M329 177 L329 192 L342 190 Z" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <!-- Birds -->
  <g id="birds">
    <path id="bird-1" d="M60 80 Q65 75 70 80 Q75 75 80 80" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="bird-2" d="M90 90 Q94 86 98 90 Q102 86 106 90" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
    <path id="bird-3" d="M45 100 Q48 97 51 100 Q54 97 57 100" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="bird-4" d="M300 70 Q305 65 310 70 Q315 65 320 70" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <path id="bird-5" d="M330 85 Q334 81 338 85 Q342 81 346 85" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  </g>
  
  <!-- Beach/Shore in foreground -->
  <path id="shore" d="M0 350 Q100 340 200 355 Q300 370 400 355 L400 400 L0 400 Z" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Beach textures -->
  <g id="sand-details">
    <path id="sand-line-1" d="M20 365 Q40 363 60 366" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
    <path id="sand-line-2" d="M100 358 Q120 355 140 360" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
    <path id="sand-line-3" d="M180 368 Q200 365 220 370" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
    <path id="sand-line-4" d="M280 360 Q300 358 320 362" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
    <path id="sand-line-5" d="M350 368 Q370 365 390 370" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
  </g>
  
  <!-- Shells on beach -->
  <g id="shells">
    <ellipse id="shell-1" cx="80" cy="375" rx="8" ry="5" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="shell-1-detail" d="M74 375 Q80 372 86 375" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
    
    <path id="shell-2" d="M250 380 Q255 370 260 380 Q265 390 260 385 Q255 380 250 385 Q245 390 250 380" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    
    <ellipse id="shell-3" cx="350" cy="372" rx="6" ry="4" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="shell-3-detail" d="M345 372 Q350 369 355 372" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
  </g>
  
  <!-- Starfish -->
  <g id="starfish">
    <path id="star" d="M160 385 L165 378 L170 385 L178 382 L172 388 L178 394 L170 391 L165 398 L160 391 L152 394 L158 388 L152 382 Z" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <!-- Footprints -->
  <g id="footprints">
    <ellipse id="foot-1" cx="300" cy="385" rx="5" ry="8" fill="white" stroke="#1a1a1a" stroke-width="0.4" transform="rotate(-20 300 385)"/>
    <ellipse id="foot-2" cx="315" cy="378" rx="5" ry="8" fill="white" stroke="#1a1a1a" stroke-width="0.4" transform="rotate(-15 315 378)"/>
    <ellipse id="foot-3" cx="330" cy="385" rx="5" ry="8" fill="white" stroke="#1a1a1a" stroke-width="0.4" transform="rotate(-20 330 385)"/>
  </g>
</svg>