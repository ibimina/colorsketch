<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cute Kawaii Deer -->
  
  <!-- Body -->
  <ellipse id="body" cx="200" cy="280" rx="70" ry="55" fill="white"/>
  
  <!-- Back legs -->
  <path id="back-leg-left" d="M150 310 L140 360 L145 365 L155 365 L160 360 L155 320" fill="white"/>
  <path id="back-leg-right" d="M250 310 L260 360 L255 365 L245 365 L240 360 L245 320" fill="white"/>
  
  <!-- Front legs -->
  <path id="front-leg-left" d="M165 300 L160 355 L165 360 L175 360 L180 355 L178 305" fill="white"/>
  <path id="front-leg-right" d="M235 300 L240 355 L235 360 L225 360 L220 355 L222 305" fill="white"/>
  
  <!-- Hooves -->
  <ellipse id="hoof-1" cx="147" cy="365" rx="8" ry="5" fill="white"/>
  <ellipse id="hoof-2" cx="253" cy="365" rx="8" ry="5" fill="white"/>
  <ellipse id="hoof-3" cx="170" cy="360" rx="8" ry="5" fill="white"/>
  <ellipse id="hoof-4" cx="230" cy="360" rx="8" ry="5" fill="white"/>
  
  <!-- Tail -->
  <ellipse id="tail" cx="270" cy="260" rx="15" ry="20" fill="white"/>
  <ellipse id="tail-inner" cx="270" cy="265" rx="8" ry="12" fill="white" stroke-dasharray="3,3"/>
  
  <!-- Spots on body -->
  <ellipse id="spot-1" cx="170" cy="265" rx="8" ry="6" fill="white"/>
  <ellipse id="spot-2" cx="220" cy="250" rx="6" ry="5" fill="white"/>
  <ellipse id="spot-3" cx="185" cy="290" rx="7" ry="5" fill="white"/>
  <ellipse id="spot-4" cx="230" cy="285" rx="5" ry="4" fill="white"/>
  
  <!-- Neck -->
  <path id="neck" d="M180 240 Q175 200 185 170 L215 170 Q225 200 220 240" fill="white"/>
  
  <!-- Head -->
  <ellipse id="head" cx="200" cy="130" rx="55" ry="50" fill="white"/>
  
  <!-- Ears -->
  <path id="ear-left" d="M145 100 Q130 70 140 50 Q155 55 160 85 Q155 95 145 100" fill="white"/>
  <path id="ear-right" d="M255 100 Q270 70 260 50 Q245 55 240 85 Q245 95 255 100" fill="white"/>
  <path id="ear-inner-left" d="M150 85 Q145 70 150 60" fill="none"/>
  <path id="ear-inner-right" d="M250 85 Q255 70 250 60" fill="none"/>
  
  <!-- Antlers -->
  <path id="antler-left" d="M155 75 L145 45 M145 55 L135 45 M145 65 L130 55" fill="none" stroke-width="3"/>
  <path id="antler-right" d="M245 75 L255 45 M255 55 L265 45 M255 65 L270 55" fill="none" stroke-width="3"/>
  
  <!-- Face -->
  <!-- Big kawaii eyes -->
  <ellipse id="eye-left" cx="175" cy="130" rx="18" ry="20" fill="white"/>
  <ellipse id="eye-right" cx="225" cy="130" rx="18" ry="20" fill="white"/>
  <circle id="pupil-left" cx="178" cy="132" r="10" fill="white"/>
  <circle id="pupil-right" cx="228" cy="132" r="10" fill="white"/>
  <circle id="sparkle-left-1" cx="172" cy="125" r="4" fill="white"/>
  <circle id="sparkle-left-2" cx="182" cy="135" r="2" fill="white"/>
  <circle id="sparkle-right-1" cx="222" cy="125" r="4" fill="white"/>
  <circle id="sparkle-right-2" cx="232" cy="135" r="2" fill="white"/>
  
  <!-- Eyebrows -->
  <path id="eyebrow-left" d="M160 105 Q175 100 190 105" fill="none"/>
  <path id="eyebrow-right" d="M210 105 Q225 100 240 105" fill="none"/>
  
  <!-- Nose -->
  <ellipse id="nose" cx="200" cy="155" rx="8" ry="6" fill="white"/>
  
  <!-- Mouth -->
  <path id="mouth" d="M190 165 Q200 172 210 165" fill="none"/>
  
  <!-- Blush cheeks -->
  <ellipse id="blush-left" cx="155" cy="145" rx="12" ry="6" fill="white" stroke-dasharray="2,2"/>
  <ellipse id="blush-right" cx="245" cy="145" rx="12" ry="6" fill="white" stroke-dasharray="2,2"/>
  
  <!-- Flowers decoration -->
  <circle id="flower-1-center" cx="280" cy="320" r="6" fill="white"/>
  <ellipse id="flower-1-petal-1" cx="280" cy="308" rx="5" ry="8" fill="white"/>
  <ellipse id="flower-1-petal-2" cx="291" cy="316" rx="5" ry="8" fill="white" transform="rotate(72 280 320)"/>
  <ellipse id="flower-1-petal-3" cx="288" cy="328" rx="5" ry="8" fill="white" transform="rotate(144 280 320)"/>
  <ellipse id="flower-1-petal-4" cx="272" cy="328" rx="5" ry="8" fill="white" transform="rotate(216 280 320)"/>
  <ellipse id="flower-1-petal-5" cx="269" cy="316" rx="5" ry="8" fill="white" transform="rotate(288 280 320)"/>
  
  <circle id="flower-2-center" cx="120" cy="340" r="5" fill="white"/>
  <ellipse id="flower-2-petal-1" cx="120" cy="330" rx="4" ry="6" fill="white"/>
  <ellipse id="flower-2-petal-2" cx="129" cy="336" rx="4" ry="6" fill="white" transform="rotate(72 120 340)"/>
  <ellipse id="flower-2-petal-3" cx="126" cy="348" rx="4" ry="6" fill="white" transform="rotate(144 120 340)"/>
  <ellipse id="flower-2-petal-4" cx="114" cy="348" rx="4" ry="6" fill="white" transform="rotate(216 120 340)"/>
  <ellipse id="flower-2-petal-5" cx="111" cy="336" rx="4" ry="6" fill="white" transform="rotate(288 120 340)"/>
  
  <!-- Grass -->
  <path id="grass-1" d="M90 380 Q95 365 100 380" fill="none"/>
  <path id="grass-2" d="M100 380 Q108 360 115 380" fill="none"/>
  <path id="grass-3" d="M300 380 Q305 368 310 380" fill="none"/>
  <path id="grass-4" d="M310 380 Q318 365 325 380" fill="none"/>
</svg>