    <path id="bp-1-i" d="M155 215 Q150 205 160 202 Q170 199 172 212 Q174 225 164 227 Q154 229 155 215" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    <circle cx="162" cy="215" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
    
    <path id="bp-2" d="M200 250 Q190 230 205 225 Q220 220 225 240 Q230 260 215 265 Q200 270 200 250" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
    <path id="bp-2-i" d="M205 245 Q200 235 210 232 Q220 229 222 242 Q224 255 214 257 Q204 259 205 245" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    
    <path id="bp-3" d="M250 230 Q240 210 255 205 Q270 200 275 220 Q280 240 265 245 Q250 250 250 230" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
    <path id="bp-3-i" d="M255 225 Q250 215 260 212 Q270 209 272 222 Q274 235 264 237 Q254 239 255 225" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    
