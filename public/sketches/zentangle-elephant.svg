    <circle id="hp-1-i" cx="80" cy="130" r="5" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    
    <circle id="hp-2" cx="110" cy="120" r="8" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle id="hp-2-i" cx="110" cy="120" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    
    <circle id="hp-3" cx="140" cy="135" r="10" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle id="hp-3-i" cx="140" cy="135" r="5" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    
