    <path id="tp-2" d="M125 220 Q135 218 143 225" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="tp-3" d="M122 240 Q132 238 140 245" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="tp-4" d="M120 260 Q130 258 137 265" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="tp-5" d="M118 280 Q128 278 134 285" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="tp-6" d="M115 300 Q125 298 130 305" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="tp-7" d="M112 320 Q122 318 127 325" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="tp-8" d="M108 340 Q118 338 122 345" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="tp-9" d="M105 360 Q115 358 118 365" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <!-- Tusks -->
  <path id="tusk" d="M135 195 Q150 190 160 170 Q175 150 180 140" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <path id="tusk-detail" d="M142 188 Q152 185 160 175" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
  
  <!-- Legs -->
