    <circle id="bc-1-i" cx="130" cy="260" r="7" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    <circle id="bc-1-c" cx="130" cy="260" r="3" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
    
    <circle id="bc-2" cx="160" cy="280" r="10" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle id="bc-2-i" cx="160" cy="280" r="5" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    
    <circle id="bc-3" cx="200" cy="295" r="12" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle id="bc-3-i" cx="200" cy="295" r="7" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    <circle id="bc-3-c" cx="200" cy="295" r="3" fill="white" stroke="#1a1a1a" stroke-width="0.3"/>
    
    <circle id="bc-4" cx="240" cy="285" r="10" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle id="bc-4-i" cx="240" cy="285" r="5" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    
    <circle id="bc-5" cx="275" cy="265" r="11" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle id="bc-5-i" cx="275" cy="265" r="6" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    
    <!-- Scale pattern -->
    <path id="bs-1" d="M290 230 Q305 220 320 230" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="bs-2" d="M285 245 Q300 235 315 245" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="bs-3" d="M295 245 Q310 235 325 245" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="bs-4" d="M280 260 Q295 250 310 260" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="bs-5" d="M290 260 Q305 250 320 260" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <!-- Head -->
