    <path id="leg-br-p1" d="M285 325 Q295 320 310 325" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="leg-br-p2" d="M285 345 Q295 340 310 345" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="leg-br-p3" d="M285 365 Q295 360 310 365" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  
  <!-- Tail -->
  <path id="tail" d="M330 240 Q350 235 360 250 Q365 265 355 275" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse id="tail-tuft" cx="355" cy="282" rx="8" ry="12" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
  
  <!-- Decorative crown/headdress -->
  <g id="crown">
    <path id="crown-base" d="M50 95 Q80 85 100 75 Q120 65 140 60 Q120 35 100 25 Q80 35 60 55 Q45 70 50 95" fill="white" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="100" cy="45" r="8" fill="white" stroke="#1a1a1a" stroke-width="0.6"/>
    <circle cx="100" cy="45" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    <circle cx="75" cy="55" r="6" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="125" cy="55" r="6" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="crown-line-1" d="M65 70 Q75 65 85 70" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    <path id="crown-line-2" d="M115 70 Q125 65 135 70" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
  </g>
</svg>