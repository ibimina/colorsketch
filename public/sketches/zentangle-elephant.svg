    <path id="leg-fl-p1" d="M135 330 Q145 325 160 330" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="leg-fl-p2" d="M135 350 Q145 345 160 350" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="leg-fl-p3" d="M135 370 Q145 365 160 370" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    
    <!-- Front right leg -->
    <rect id="leg-fr" x="180" y="315" width="35" height="65" rx="10" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <path id="leg-fr-p1" d="M185 335 Q195 330 210 335" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="leg-fr-p2" d="M185 355 Q195 350 210 355" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    
    <!-- Back left leg -->
    <rect id="leg-bl" x="230" y="315" width="35" height="65" rx="10" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <path id="leg-bl-p1" d="M235 335 Q245 330 260 335" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="leg-bl-p2" d="M235 355 Q245 350 260 355" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    
