    <circle cx="125" cy="155" r="3" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    <circle cx="150" cy="160" r="3" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
  </g>
  
