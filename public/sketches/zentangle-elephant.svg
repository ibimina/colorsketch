    <path id="ep-1" d="M35 130 Q45 125 50 135" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="ep-2" d="M30 145 Q40 140 50 150" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <path id="ep-3" d="M35 160 Q45 155 55 165" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="45" cy="145" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
    <circle cx="50" cy="165" r="3" fill="white" stroke="#1a1a1a" stroke-width="0.4"/>
  </g>
  
