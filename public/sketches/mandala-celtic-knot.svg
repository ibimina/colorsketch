<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Celtic Knot Mandala - Adult Coloring -->
  
  <!-- Outer circle -->
  <circle cx="200" cy="200" r="180" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Celtic knot border -->
  <g id="border-knots">
    <path d="M 200 30 Q 220 35 230 50 Q 235 70 220 80 Q 200 85 190 70 Q 185 50 200 30" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 260 45 Q 275 55 280 75 Q 275 95 255 100 Q 240 95 235 75 Q 240 55 260 45" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 310 85 Q 325 100 325 120 Q 320 140 300 145 Q 285 140 280 120 Q 285 100 310 85" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 345 145 Q 360 165 355 185 Q 345 205 325 205 Q 310 200 305 180 Q 310 160 345 145" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  
  <!-- Center Celtic knot pattern -->
  <g id="center-knot">
    <!-- Four-way interlocking knot -->
    <path d="M 200 100 Q 230 100 240 130 Q 240 160 210 170 Q 180 170 170 140 Q 170 110 200 100" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 300 200 Q 300 230 270 240 Q 240 240 230 210 Q 230 180 260 170 Q 290 170 300 200" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 200 300 Q 170 300 160 270 Q 160 240 190 230 Q 220 230 230 260 Q 230 290 200 300" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 100 200 Q 100 170 130 160 Q 160 160 170 190 Q 170 220 140 230 Q 110 230 100 200" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Center circle -->
    <circle cx="200" cy="200" r="40" fill="white" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="200" cy="200" r="35" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="200" cy="200" r="30" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    
    <!-- Inner knot details -->
    <path d="M 200 165 Q 215 170 220 185 Q 215 200 200 205 Q 185 200 180 185 Q 185 170 200 165" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 235 200 Q 230 215 215 220 Q 200 215 195 200 Q 200 185 215 180 Q 230 185 235 200" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 200 235 Q 185 230 180 215 Q 185 200 200 195 Q 215 200 220 215 Q 215 230 200 235" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 165 200 Q 170 185 185 180 Q 200 185 205 200 Q 200 215 185 220 Q 170 215 165 200" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  
  <!-- Triquetra symbols in cardinal directions -->
  <g id="triquetras">
    <!-- Top -->
    <g transform="translate(200, 70)">
      <path d="M 0 0 Q -15 -10 -20 -20 Q -15 -30 0 -25 Q 15 -30 20 -20 Q 15 -10 0 0" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 Q 15 -10 20 -20" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 Q -15 -10 -20 -20" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="0" cy="-12" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>
    
    <!-- Right -->
    <g transform="translate(330, 200) rotate(90)">
      <path d="M 0 0 Q -15 -10 -20 -20 Q -15 -30 0 -25 Q 15 -30 20 -20 Q 15 -10 0 0" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 Q 15 -10 20 -20" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 Q -15 -10 -20 -20" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="0" cy="-12" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>
    
    <!-- Bottom -->
    <g transform="translate(200, 330) rotate(180)">
      <path d="M 0 0 Q -15 -10 -20 -20 Q -15 -30 0 -25 Q 15 -30 20 -20 Q 15 -10 0 0" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 Q 15 -10 20 -20" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 Q -15 -10 -20 -20" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="0" cy="-12" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>
    
    <!-- Left -->
    <g transform="translate(70, 200) rotate(270)">
      <path d="M 0 0 Q -15 -10 -20 -20 Q -15 -30 0 -25 Q 15 -30 20 -20 Q 15 -10 0 0" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 Q 15 -10 20 -20" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M 0 0 Q -15 -10 -20 -20" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="0" cy="-12" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>
  </g>
  
  <!-- Celtic spiral patterns between main elements -->
  <g id="spirals">
    <path d="M 140 120 Q 145 125 140 130 Q 135 135 130 130 Q 125 125 130 120 Q 135 115 140 120" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <path d="M 260 120 Q 265 125 260 130 Q 255 135 250 130 Q 245 125 250 120 Q 255 115 260 120" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <path d="M 280 260 Q 275 265 270 260 Q 265 255 270 250 Q 275 245 280 250 Q 285 255 280 260" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <path d="M 140 280 Q 135 275 130 280 Q 125 285 130 290 Q 135 295 140 290 Q 145 285 140 280" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  </g>
  
  <!-- Decorative corner knots -->
  <g id="corner-knots">
    <path d="M 90 90 Q 95 85 100 90 Q 105 95 100 100 Q 95 105 90 100 Q 85 95 90 90" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="95" cy="95" r="5" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    
    <path d="M 310 90 Q 305 85 300 90 Q 295 95 300 100 Q 305 105 310 100 Q 315 95 310 90" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="305" cy="95" r="5" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    
    <path d="M 310 310 Q 305 315 300 310 Q 295 305 300 300 Q 305 295 310 300 Q 315 305 310 310" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="305" cy="305" r="5" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    
    <path d="M 90 310 Q 95 315 100 310 Q 105 305 100 300 Q 95 295 90 300 Q 85 305 90 310" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="95" cy="305" r="5" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  
  <!-- Ring patterns -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="200" cy="200" r="110" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle cx="200" cy="200" r="90" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle cx="200" cy="200" r="60" fill="none" stroke="#1a1a1a" stroke-width="1"/>
</svg>